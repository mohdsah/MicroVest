# ═══════════════════════════════════════════════════════════════
# MicroVest v8 — .github/workflows/deploy.yml
# GitHub Actions CI/CD Pipeline
# ─────────────────────────────────────────────────────────────
# Triggers:
#   push to main     → Auto deploy to Netlify Production
#   push to develop  → Deploy to Netlify Preview
#   pull_request     → Deploy preview + run checks
#
# Required GitHub Secrets:
#   NETLIFY_AUTH_TOKEN     — from Netlify User Settings → OAuth
#   NETLIFY_SITE_ID        — from Netlify Site → General → Site ID
#   SUPABASE_URL           — project URL
#   SUPABASE_ANON_KEY      — anon/public key
#   SUPABASE_SERVICE_KEY   — service_role key (for migrations)
#   SUPABASE_ACCESS_TOKEN  — from Supabase account settings
#   SUPABASE_PROJECT_REF   — project ref (e.g. zmyiaviafmmwpgxfvsbq)
#   ADMIN_SECRET_KEY       — custom secret for push function
#   VAPID_PUBLIC_KEY       — web push public key
#   VAPID_PRIVATE_KEY      — web push private key
# ═══════════════════════════════════════════════════════════════

name: 🚀 MicroVest Deploy Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
  pull_request:
    branches:
      - main
      - develop

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_VERSION: '8.0'
  NODE_VERSION: '20'

# ─────────────────────────────────────────────────────────────
# JOB 1: VALIDATE
# ─────────────────────────────────────────────────────────────
jobs:
  validate:
    name: 🔍 Validate & Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci --prefer-offline
          else
            echo "No package.json — static site, skipping npm install"
          fi

      - name: 🔍 Check HTML files
        run: |
          echo "=== Checking HTML files ==="
          HTML_COUNT=$(find . -name "*.html" -not -path "./.git/*" | wc -l)
          echo "Found $HTML_COUNT HTML files"
          
          # Check for truncated files (must end with </html>)
          TRUNCATED=0
          find . -name "*.html" -not -path "./.git/*" | while read f; do
            if ! tail -5 "$f" | grep -q "</html>"; then
              echo "❌ TRUNCATED: $f"
              TRUNCATED=$((TRUNCATED+1))
            fi
          done
          echo "HTML check complete"

      - name: 🔐 Check for hardcoded secrets
        run: |
          echo "=== Security: Scanning for hardcoded secrets ==="
          
          # Check for hardcoded Supabase keys (anon key pattern)
          if grep -r "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9" --include="*.js" --include="*.html" .; then
            echo "⚠️  WARNING: Hardcoded JWT token found in source files"
            echo "    Replace with __SUPA_KEY__ placeholder for env injection"
            # Don't fail — warn only (config.js still has it for fallback)
          else
            echo "✅ No hardcoded JWTs found"
          fi
          
          # Check for private keys
          if grep -r "VAPID_PRIVATE\|service_role\|supabase_admin" --include="*.js" --include="*.html" .; then
            echo "❌ CRITICAL: Private key found in source!"
            exit 1
          else
            echo "✅ No private keys exposed"
          fi

      - name: 📋 Verify required files
        run: |
          echo "=== Checking required files ==="
          REQUIRED=(
            "index.html"
            "login.html"
            "dashboard.html"
            "manifest.json"
            "service-worker.js"
            "netlify.toml"
            "css/v7.css"
            "js/config.js"
            "js/security.js"
            "js/push.js"
            "offline.html"
            "schema_v7.sql"
          )
          ALL_OK=true
          for f in "${REQUIRED[@]}"; do
            if [ -f "$f" ]; then
              echo "  ✅ $f"
            else
              echo "  ❌ MISSING: $f"
              ALL_OK=false
            fi
          done
          if [ "$ALL_OK" = "false" ]; then
            echo "❌ Required files missing!"
            exit 1
          fi

      - name: 📊 Generate build report
        run: |
          echo "=== MicroVest v8 Build Report ==="
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Date:   $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "HTML:   $(find . -name "*.html" -not -path "./.git/*" | wc -l) files"
          echo "JS:     $(find ./js -name "*.js" 2>/dev/null | wc -l) files"
          echo "CSS:    $(find ./css -name "*.css" 2>/dev/null | wc -l) files"
          echo "Size:   $(du -sh --exclude=.git . | cut -f1)"

# ─────────────────────────────────────────────────────────────
# JOB 2: DEPLOY PREVIEW (PR / develop branch)
# ─────────────────────────────────────────────────────────────
  deploy-preview:
    name: 🔭 Deploy Preview
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/develop'
    
    outputs:
      preview-url: ${{ steps.netlify-preview.outputs.deploy-url }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install Netlify CLI
        run: npm install -g netlify-cli@latest

      - name: 🚀 Deploy Preview to Netlify
        id: netlify-preview
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          DEPLOY_OUTPUT=$(netlify deploy \
            --dir="." \
            --message="Preview: ${{ github.event.pull_request.title || github.sha }}" \
            --json \
            2>&1)
          echo "$DEPLOY_OUTPUT"
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('deploy_url',''))" 2>/dev/null || echo "")
          echo "deploy-url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ Preview deployed: $DEPLOY_URL"

      - name: 💬 Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.netlify-preview.outputs.preview-url }}';
            const body = `## 🔭 Preview Deploy Ready
            
            | | |
            |---|---|
            | **Preview URL** | [${previewUrl}](${previewUrl}) |
            | **Branch** | \`${{ github.head_ref }}\` |
            | **Commit** | \`${{ github.sha }}\` |
            
            > Deploy auto-expires after 30 days.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

# ─────────────────────────────────────────────────────────────
# JOB 3: DEPLOY PRODUCTION (main branch only)
# ─────────────────────────────────────────────────────────────
  deploy-production:
    name: 🚀 Deploy Production
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    environment:
      name: production
      url:  https://microvest.app

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install Netlify CLI
        run: npm install -g netlify-cli@latest

      - name: 🔐 Replace env placeholders in config.js
        env:
          SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
        run: |
          echo "Replacing env placeholders..."
          # Replace placeholders in config.js with actual values
          sed -i "s|__SUPA_URL__|$SUPABASE_URL|g"    js/config.js
          sed -i "s|__SUPA_KEY__|$SUPABASE_ANON_KEY|g" js/config.js
          sed -i "s|__VAPID_KEY__|$VAPID_PUBLIC_KEY|g" js/push.js
          sed -i "s|VERSION:'8.0'|VERSION:'${{ env.APP_VERSION }}'|g" js/config.js
          echo "✅ Environment variables injected"

      - name: 🚀 Deploy to Netlify Production
        id: netlify-prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          netlify deploy \
            --dir="." \
            --prod \
            --message="Production: v${{ env.APP_VERSION }} @ ${{ github.sha }}"
          echo "✅ Production deployed!"

      - name: 🏷️ Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `v${{ env.APP_VERSION }}-${context.sha.substring(0,7)}`;
            try {
              await github.rest.repos.createRelease({
                owner:            context.repo.owner,
                repo:             context.repo.repo,
                tag_name:         tag,
                name:             `MicroVest v${{ env.APP_VERSION }}`,
                body:             `Auto-release from CI/CD pipeline\nCommit: ${context.sha}`,
                draft:            false,
                prerelease:       false,
                generate_release_notes: true,
              });
            } catch(e) {
              console.log('Release creation skipped:', e.message);
            }

      - name: 📢 Notify deployment success
        if: success()
        run: |
          echo "🎉 MicroVest v${{ env.APP_VERSION }} deployed successfully!"
          echo "URL: https://microvest.app"
          echo "Commit: ${{ github.sha }}"

# ─────────────────────────────────────────────────────────────
# JOB 4: SUPABASE MIGRATION (main branch only)
# ─────────────────────────────────────────────────────────────
  supabase-migrate:
    name: 🗄️ Supabase Migration
    needs: deploy-production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: 🗄️ Run Supabase Migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF:  ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD:  ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          # Check if there are new migrations to apply
          if ls supabase/migrations/*.sql 2>/dev/null | head -1; then
            echo "Found migration files — applying..."
            supabase db push \
              --project-ref "$SUPABASE_PROJECT_REF" \
              --password "$SUPABASE_DB_PASSWORD" \
              --include-all
            echo "✅ Migrations applied"
          else
            echo "No migration files found — skipping"
          fi

      - name: 🔄 Deploy Supabase Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF:  ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if ls supabase/functions/ 2>/dev/null | head -1; then
            echo "Deploying Edge Functions..."
            supabase functions deploy \
              --project-ref "$SUPABASE_PROJECT_REF" \
              --no-verify-jwt
            echo "✅ Edge Functions deployed"
          else
            echo "No Edge Functions found — skipping"
          fi
