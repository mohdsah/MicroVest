<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#020206">
<title>Admin | Pengguna</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../css/v6.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
.search-wrap { padding:0 var(--pad);margin-bottom:16px;position:relative; }
.search-ico  { position:absolute;left:calc(var(--pad) + 16px);top:50%;transform:translateY(-50%);color:var(--ice-3);font-size:14px; }
.search-inp  { width:100%;background:var(--vault);border:1px solid var(--border-hi);color:var(--ice);padding:14px 18px 14px 44px;border-radius:var(--r-m);font-family:'Instrument Sans',sans-serif;font-size:14px;font-weight:600;outline:none;transition:.25s; }
.search-inp:focus { border-color:var(--v-border);box-shadow:0 0 0 3px rgba(124,58,237,.1); }

.user-card { background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);padding:18px;margin-bottom:10px;cursor:pointer;transition:border-color .2s; }
.user-card:hover { border-color:var(--v-border); }
.user-card.banned { border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.03); }
.uc-top  { display:flex;align-items:center;gap:12px;margin-bottom:12px; }
.uc-av   { width:46px;height:46px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:20px;color:#fff;flex-shrink:0; }
.uc-email{ font-size:13px;font-weight:700;margin-bottom:3px; }
.uc-meta { font-size:10px;color:var(--ice-3); }
.uc-stats{ display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px; }
.uc-stat { background:rgba(255,255,255,.03);border-radius:10px;padding:8px;text-align:center; }
.uc-sv   { font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;display:block;margin-bottom:2px; }
.uc-sl   { font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ice-3); }
.uc-actions { display:flex;gap:8px;flex-wrap:wrap; }

.sheet-back{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(18px);z-index:900;display:flex;align-items:flex-end;justify-content:center;}
.sheet-box{background:linear-gradient(175deg,#0A0A16,#04040C);border:1px solid rgba(255,255,255,.07);border-radius:28px 28px 0 0;width:min(500px,100%);padding:28px 24px 48px;animation:slide-up .4s cubic-bezier(0.34,1.56,0.64,1) both;}
</style>
</head>
<body>
<div class="amb-v"></div>
<div class="shell">
  <div class="pg-hd anim a1">
    <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
  <a href="robots.html" style="color:#FB923C;font-size:11px;font-weight:800;text-decoration:none;display:flex;align-items:center;gap:5px;padding:7px 12px;border:1px solid rgba(251,146,60,.2);border-radius:9px;background:rgba(251,146,60,.06)">🤖 Robot</a>
    <a href="tickets.html" style="color:var(--v-pale);font-size:11px;font-weight:800;text-decoration:none;display:flex;align-items:center;gap:5px;padding:7px 12px;border:1px solid rgba(124,58,237,.2);border-radius:9px;background:rgba(124,58,237,.06)">🎫 Tiket</a>
    <div><div class="pg-title">Pengurusan Pengguna</div><div class="pg-sub" id="userCountLbl">—</div></div>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap anim a2">
    <i class="fas fa-search search-ico"></i>
    <input class="search-inp" id="searchInp" type="text" placeholder="Cari emel pengguna..." oninput="searchUsers(this.value)">
  </div>

  <!-- FILTER -->
  <div style="display:flex;gap:8px;overflow-x:auto;padding:0 var(--pad) 16px" class="anim a2">
    <button class="filter-btn on" onclick="filterUsers('all',this)">Semua</button>
    <button class="filter-btn" onclick="filterUsers('active',this)">✅ Aktif</button>
    <button class="filter-btn" onclick="filterUsers('banned',this)">🚫 Dibanned</button>
    <button class="filter-btn" onclick="filterUsers('vip',this)">👑 VIP+</button>
  </div>

  <div id="userList" style="padding:0 var(--pad)">
    <div class="skel skel-row anim a1" style="border-radius:22px;margin-bottom:10px"></div>
    <div class="skel skel-row anim a2" style="border-radius:22px;margin-bottom:10px"></div>
    <div class="skel skel-row anim a3" style="border-radius:22px"></div>
  </div>
</div>

<div id="sheetCon"></div>

<script src="../js/config.js"></script>
<script src="../js/ui.js"></script>
<script>
let _users=[], _filtered=[], _curFilter='all';

async function guardAdmin() {
  const {data:{session}} = await db.auth.getSession();
  if (!session) { location.href='../login.html'; return null; }
  const {data:p} = await db.from('profiles').select('is_admin').eq('id',session.user.id).single();
  if (!p?.is_admin) { location.href='../dashboard.html'; return null; }
  return session.user;
}

async function loadUsers() {
  const {data} = await db.from('profiles').select('*').eq('is_admin',false).order('created_at',{ascending:false}).limit(100);
  _users = data||[];
  applyFilter();
  document.getElementById('userCountLbl').textContent = `${_users.length} pengguna terdaftar`;
}

function filterUsers(f,btn) {
  _curFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  applyFilter();
}

function applyFilter() {
  let list = _users;
  if (_curFilter==='banned') list=list.filter(u=>u.is_banned);
  if (_curFilter==='active') list=list.filter(u=>!u.is_banned);
  if (_curFilter==='vip')    list=list.filter(u=>['gold','diamond'].includes(u.vip_rank));
  _filtered=list;
  renderUsers(list);
  // Async: load robot counts per user and update cells
  (async () => {
    const { data } = await db.from('user_robots').select('user_id').eq('status','active').catch(()=>({data:[]}));
    const counts = {};
    (data||[]).forEach(r => counts[r.user_id] = (counts[r.user_id]||0)+1);
    Object.entries(counts).forEach(([uid, cnt]) => {
      const el = document.getElementById('rb-'+uid);
      if (el) el.textContent = cnt;
    });
  })();
}

function searchUsers(q) {
  const found = q ? _users.filter(u=>(u.email||'').toLowerCase().includes(q.toLowerCase())) : _users;
  _filtered = found;
  renderUsers(found);
}

const RANK_COLORS = {member:'#475569',bronze:'#CD7F32',silver:'#94A3B8',gold:'#EAB308',diamond:'#7C3AED'};

function renderUsers(list) {
  const el = document.getElementById('userList');
  if (!list.length) { el.innerHTML='<div style="text-align:center;padding:40px;color:var(--ice-3)">Tiada pengguna dijumpai</div>'; return; }
  el.innerHTML = list.map(u => {
    const rank  = MV.getRank(u.total_deposit||0);
    const color = RANK_COLORS[rank.id]||'#475569';
    const init  = (u.email||'?')[0].toUpperCase();
    return `
    <div class="user-card ${u.is_banned?'banned':''}" onclick="openUserSheet('${u.id}')">
      <div class="uc-top">
        <div class="uc-av" style="background:linear-gradient(135deg,${color}88,${color})">${init}</div>
        <div style="flex:1">
          <div class="uc-email">${u.email} ${u.is_banned?'<span style="font-size:9px;color:#EF4444;background:rgba(239,68,68,.1);padding:2px 7px;border-radius:999px;margin-left:4px">BANNED</span>':''}</div>
          <div class="uc-meta">${rank.icon} ${rank.name} · Daftar ${UI.ago(u.created_at)}</div>
        </div>
        <i class="fas fa-chevron-right" style="color:var(--ice-3);font-size:12px"></i>
      </div>
      <div class="uc-stats">
        <div class="uc-stat"><span class="uc-sv profit">${UI.rm(u.balance||0)}</span><span class="uc-sl">Baki</span></div>
        <div class="uc-stat"><span class="uc-sv v-pale">${UI.rm(u.total_deposit||0)}</span><span class="uc-sl">Deposit</span></div>
        <div class="uc-stat"><span class="uc-sv gold">${UI.rm(u.total_earned||0)}</span><span class="uc-sl">Earned</span></div>
        <div class="uc-stat"><span class="uc-sv" style="color:#FDBA74">${(u.mvt_balance||0).toFixed(0)}</span><span class="uc-sl">MVT</span></div>
        <div class="uc-stat"><span class="uc-sv" style="color:#A78BFA" id="rb-${u.id}">…</span><span class="uc-sl">Robots</span></div>
      </div>
    </div>`;
  }).join('');
}

function openUserSheet(userId) {
  const u = _users.find(x=>x.id===userId);
  if (!u) return;
  const rank = MV.getRank(u.total_deposit||0);
  document.getElementById('sheetCon').innerHTML = `
    <div class="sheet-back" onclick="closeSheet(event)">
      <div class="sheet-box" onclick="event.stopPropagation()">
        <div style="width:36px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin:0 auto 20px"></div>
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
          <div style="width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,${RANK_COLORS[rank.id]}88,${RANK_COLORS[rank.id]});display:flex;align-items:center;justify-content:center;font-size:24px;font-family:'Bebas Neue',sans-serif;color:#fff;flex-shrink:0">${(u.email||'?')[0].toUpperCase()}</div>
          <div>
            <div style="font-size:14px;font-weight:700;margin-bottom:2px">${u.email}</div>
            <div style="font-size:11px;color:var(--ice-3)">${rank.icon} ${rank.name} · ${u.id.slice(0,10)}…</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px">
          ${[
            ['Baki','RM '+(u.balance||0).toFixed(2),'var(--profit)'],
            ['Total Deposit','RM '+(u.total_deposit||0).toFixed(2),'var(--v-pale)'],
            ['Total Earned','RM '+(u.total_earned||0).toFixed(2),'var(--gold)'],
            ['MVT',(u.mvt_balance||0).toFixed(0)+' MVT','#FDBA74'],
            ['XP',(u.xp||0)+' XP','var(--v-pale)'],
            ['Login Streak',(u.login_streak||0)+' hari','var(--profit)'],
          ].map(([l,v,c])=>`<div style="background:rgba(255,255,255,.03);border-radius:12px;padding:12px;text-align:center"><div style="font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:${c};margin-bottom:3px">${v}</div><div style="font-size:9px;color:var(--ice-3);letter-spacing:1.5px;text-transform:uppercase">${l}</div></div>`).join('')}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
          <button class="btn btn-sm" style="background:rgba(59,130,246,.1);color:#93C5FD;border:1px solid rgba(59,130,246,.2)" onclick="adjustBal('${u.id}','${u.email}',${u.balance||0})">💰 Edit Baki</button>
          <button class="btn btn-sm" style="background:${u.is_banned?'rgba(34,197,94,.1)':'rgba(239,68,68,.1)'};color:${u.is_banned?'var(--profit)':'var(--loss)'};border:1px solid ${u.is_banned?'rgba(34,197,94,.2)':'rgba(239,68,68,.2)'}" onclick="toggleBan('${u.id}','${u.email}',${u.is_banned})">
            ${u.is_banned?'✅ Unban':'🚫 Ban'} Akaun
          </button>
        </div>
        <button class="btn btn-ghost btn-sm btn-full" onclick="sendNotif('${u.id}')">🔔 Hantar Notifikasi</button>
      </div>
    </div>`;
}
function closeSheet(e) { if (!e||e.target.classList.contains('sheet-back')) document.getElementById('sheetCon').innerHTML=''; }

async function adjustBal(userId, email, currentBal) {
  closeSheet(null);
  const input = prompt(`Edit baki ${email}\nBaki semasa: RM ${currentBal.toFixed(2)}\n\nMasukkan jumlah untuk ditambah (positif) atau ditolak (negatif):`);
  if (input===null) return;
  const delta = parseFloat(input);
  if (isNaN(delta)) { UI.toast('Jumlah tidak sah','error'); return; }
  UI.loading();
  const newBal = Math.max(0, currentBal + delta);
  await db.from('profiles').update({ balance: newBal }).eq('id',userId);
  await db.from('wallets').update({ balance: newBal }).eq('user_id',userId).eq('wallet_type','main').catch(()=>{});
  await db.from('admin_logs').insert([{ admin_id:(await db.auth.getUser()).data.user.id, action:'adjust_balance', target_user_id:userId, details:`${delta>=0?'+':''}${delta} → RM${newBal.toFixed(2)}` }]).catch(()=>{});
  const u = _users.find(x=>x.id===userId);
  if (u) u.balance = newBal;
  UI.unload();
  UI.toast(`✅ Baki ${email} dikemaskini: RM${newBal.toFixed(2)}`,'success');
  renderUsers(_filtered);
}

async function toggleBan(userId, email, isBanned) {
  closeSheet(null);
  const action = isBanned ? 'unban' : 'ban';
  UI.confirm(`${isBanned?'Unban':'Ban'} ${email}`, `${isBanned?'Aktifkan semula':'Blok'} akaun ini?`, async () => {
    UI.loading();
    await db.from('profiles').update({ is_banned: !isBanned }).eq('id',userId);
    await db.from('admin_logs').insert([{ admin_id:(await db.auth.getUser()).data.user.id, action:`${action}_user`, target_user_id:userId, details:email }]).catch(()=>{});
    const u = _users.find(x=>x.id===userId);
    if (u) u.is_banned = !isBanned;
    UI.unload();
    UI.toast(`✅ Akaun ${email} ${isBanned?'diaktifkan':'dibanned'}!`,'success');
    renderUsers(_filtered);
  }, isBanned?'Unban':'Ban', !isBanned);
}

async function sendNotif(userId) {
  closeSheet(null);
  const msg = prompt('Mesej notifikasi:');
  if (!msg) return;
  await db.from('notifications').insert([{ user_id:userId, type:'admin', message:`📢 Admin: ${msg}` }]);
  UI.toast('✅ Notifikasi dihantar!','success');
}

async function init() {
  UI.loading();
  const user = await guardAdmin();
  if (!user) return;
  await loadUsers();
  UI.unload();
}
window.addEventListener('load',init);

/* filter-btn style reuse */
document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('.filter-btn').forEach(b=>{
    b.style.cssText='padding:8px 16px;border-radius:999px;border:1px solid rgba(255,255,255,.06);background:transparent;color:#8B95BB;font-size:11px;font-weight:700;cursor:pointer;font-family:Instrument Sans,sans-serif;white-space:nowrap;flex-shrink:0;transition:.2s';
    if(b.classList.contains('on')){b.style.background='rgba(124,58,237,.12)';b.style.borderColor='rgba(124,58,237,.3)';b.style.color='#A78BFA';}
  });
});
</script>
</body>
</html>
