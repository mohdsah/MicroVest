<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#020206">
<title>MicroVest v8 | Papan Lider</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/v7.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* Top 3 podium */
.podium { display:flex; align-items:flex-end; justify-content:center; gap:12px; padding:28px var(--pad) 20px; }
.pod-col { display:flex; flex-direction:column; align-items:center; }
.pod-av  {
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-family:'Bebas Neue',sans-serif; color:#fff; font-size:20px;
  position:relative; margin-bottom:8px; flex-shrink:0;
}
.pod-crown { position:absolute; top:-18px; left:50%; transform:translateX(-50%); font-size:20px; }
.pod-name  { font-size:10px; font-weight:700; text-align:center; margin-bottom:4px; max-width:70px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pod-val   { font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; }
.pod-base  { border-radius:14px 14px 0 0; width:100%; display:flex; align-items:center; justify-content:center; padding:10px 0; }
.pod-rank  { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; }

/* Rank list */
.rank-tabs { display:flex; gap:6px; padding:0 var(--pad); margin-bottom:18px;
  position:sticky; top:72px; z-index:100;
  background:linear-gradient(rgba(2,2,6,.97) 80%,transparent); padding-bottom:12px; }
.rtab { flex:1; padding:11px; border-radius:14px; border:1px solid var(--border); background:transparent; color:var(--ice-3); font-family:'Instrument Sans',sans-serif; font-weight:700; font-size:12px; cursor:pointer; transition:.2s; }
.rtab.on { background:var(--v-dim); border-color:var(--v-border); color:var(--v-pale); }

/* List row */
.lb-row {
  display:flex; align-items:center; gap:12px;
  padding:14px var(--pad); border-bottom:1px solid rgba(255,255,255,.03);
  position:relative; transition:background .15s;
}
.lb-row.me { background:rgba(124,58,237,.06); border:1px solid rgba(124,58,237,.12); border-radius:var(--r-l); margin:4px var(--pad); padding:14px; }
.lb-num  { width:28px; text-align:center; font-family:'Bebas Neue',sans-serif; font-size:18px; flex-shrink:0; }
.lb-av   { width:44px; height:44px; border-radius:15px; display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:20px; color:#fff; flex-shrink:0; }
.lb-info { flex:1; }
.lb-name { font-size:13px; font-weight:700; margin-bottom:3px; }
.lb-rank { font-size:10px; color:var(--ice-3); }
.lb-val  { font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:700; text-align:right; }
.lb-delta{ font-size:9px; text-align:right; margin-top:2px; font-weight:700; }

/* My position strip */
.my-pos {
  margin:12px var(--pad); background:var(--v-dim); border:1px solid var(--v-border);
  border-radius:var(--r-l); padding:14px 18px;
  display:flex; align-items:center; gap:12px;
}
</style>
</head>
<body>
<div class="amb-v"></div>
<div class="shell">

  <!-- HEADER -->
  <div class="pg-hd anim a1">
    <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <div><div class="pg-title">Papan Lider</div><div class="pg-sub">Pertandingan Bulanan</div></div>
    <div class="chip" style="margin-left:auto;background:rgba(234,179,8,.1);border:1px solid rgba(234,179,8,.2);color:#FDE68A" id="myRankChip">—</div>
  </div>

  <!-- RANK TABS -->
  <div class="rank-tabs anim a2">
    <button class="rtab on" id="rt-profit"  onclick="switchLB('profit',this)">💰 Profit</button>
    <button class="rtab"    id="rt-deposit" onclick="switchLB('deposit',this)">📥 Deposit</button>
    <button class="rtab"    id="rt-mvt"     onclick="switchLB('mvt',this)">🪙 MVT</button>
    <button class="rtab"    id="rt-referral"onclick="switchLB('referral',this)">👥 Referral</button>
    <button class="rtab"    id="rt-robot"   onclick="switchLB('robot',this)">🤖 Robot</button>
  </div>

  <!-- PODIUM (TOP 3) -->
  <div class="podium anim a2" id="podium"></div>

  <!-- MY POSITION -->
  <div id="myPosBanner" class="anim a3" style="display:none"></div>

  <!-- FULL LEADERBOARD -->
  <div id="lbList" class="anim a3">
    <div class="skel skel-row" style="border-radius:14px;margin:6px var(--pad)"></div>
    <div class="skel skel-row" style="border-radius:14px;margin:6px var(--pad)"></div>
    <div class="skel skel-row" style="border-radius:14px;margin:6px var(--pad)"></div>
    <div class="skel skel-row" style="border-radius:14px;margin:6px var(--pad)"></div>
    <div class="skel skel-row" style="border-radius:14px;margin:6px var(--pad)"></div>
  </div>

  <div style="padding:20px var(--pad);text-align:center;font-size:11px;color:var(--ice-3)">
    Dikemaskini setiap jam · Bulan <span id="monthLabel">—</span>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item active"><i class="fas fa-house"></i><span>Home</span></a>
  <a href="investment.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Invest</span></a>
  <a href="robots.html" class="nav-item" style="position:relative">
    <span style="position:absolute;top:-3px;left:50%;transform:translateX(-50%);width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#5B21B6,#7C3AED);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(124,58,237,.5);pointer-events:none"></span><i class="fas fa-robot"></i><span>Robot</span></a>
  <a href="mining.html" class="nav-item"><i class="fas fa-microchip"></i><span>Mining</span></a>
  <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i><span>Profil</span></a>
</nav>

<script src="js/config.js"></script>
<script src="js/security.js"></script>
<script src="js/ui.js"></script>
<script src="js/lang.js"></script>
<script>
let _user, _curType='profit', _fullData=[];
const RANK_COLORS = { member:'#475569', bronze:'#CD7F32', silver:'#94A3B8', gold:'#EAB308', diamond:'#7C3AED' };
const POD_COLORS  = ['#EAB308','#94A3B8','#CD7F32'];
const POD_CROWNS  = ['👑','🥈','🥉'];
const POD_SIZES   = [64,54,50];
const POD_HEIGHTS = [80,65,55];

/* ── SWITCH LEADERBOARD TYPE ─────────────────────────────── */
async function switchLB(type, btn) {
  _curType = type;
  document.querySelectorAll('.rtab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  await loadLeaderboard(type);
}

/* ── LOAD DATA ──────────────────────────────────────────────── */
async function loadLeaderboard(type) {
  const el = document.getElementById('lbList');
  document.getElementById('podium').innerHTML='';
  UI.skeleton(el,8,'row');

  let data;
  if (type==='profit') {
    const { data:d } = await db.from('profiles').select('id,email,total_earned,vip_rank,total_deposit').eq('is_banned',false).order('total_earned',{ascending:false}).limit(50);
    data=(d||[]).map(u=>({...u,score:u.total_earned||0,label:'RM'}));
  } else if (type==='deposit') {
    const { data:d } = await db.from('profiles').select('id,email,total_deposit,vip_rank').eq('is_banned',false).order('total_deposit',{ascending:false}).limit(50);
    data=(d||[]).map(u=>({...u,score:u.total_deposit||0,label:'RM'}));
  } else if (type==='mvt') {
    const { data:d } = await db.from('profiles').select('id,email,mvt_balance,vip_rank,total_deposit').eq('is_banned',false).order('mvt_balance',{ascending:false}).limit(50);
    data=(d||[]).map(u=>({...u,score:u.mvt_balance||0,label:'MVT'}));
  } else {
    // Robot = total_earned from user_robots
    } else if (type === 'robot') {
      const { data } = await db.from('user_robots')
        .select('total_earned, robot_id, profiles(email, vip_rank)')
        .eq('status', 'active')
        .order('total_earned', { ascending:false })
        .limit(50);
      list = (data||[]).map(r => ({
        email:     r.profiles?.email || '—',
        vip_rank:  r.profiles?.vip_rank || 'member',
        value:     r.total_earned || 0,
        label:     r.robot_id,
      }));

    // Referral = count referral_commissions
    const { data:d } = await db.from('profiles').select('id,email,vip_rank,total_deposit').eq('is_banned',false).limit(50);
    const counts={};
    const { data:comms } = await db.from('referral_commissions').select('referrer_id,amount');
    (comms||[]).forEach(c=>{ counts[c.referrer_id]=(counts[c.referrer_id]||0)+1; });
    data=((d||[]).map(u=>({...u,score:counts[u.id]||0,label:'ahli'}))).sort((a,b)=>b.score-a.score);
  }

  _fullData = data||[];
  renderPodium(_fullData.slice(0,3), type);
  renderList(_fullData, type);
  findMyPos(_fullData);
}

/* ── PODIUM ─────────────────────────────────────────────── */
function renderPodium(top3, type) {
  if (!top3.length) return;
  const order = [1,0,2]; // Silver,Gold,Bronze order on podium
  const el    = document.getElementById('podium');
  el.innerHTML = order.map(idx=>{
    if (!top3[idx]) return '';
    const u    = top3[idx];
    const rank = MV.getRank(u.total_deposit||0);
    const clr  = RANK_COLORS[rank.id]||'#475569';
    const pc   = POD_COLORS[idx];
    const sz   = POD_SIZES[idx];
    const ht   = POD_HEIGHTS[idx];
    const val  = type==='mvt'?UI.k(u.score)+' MVT':type==='referral'?u.score+' ahli':UI.rm(u.score);
    return `
    <div class="pod-col" style="flex:${idx===0?1.15:1}">
      <div class="pod-av" style="width:${sz}px;height:${sz}px;background:linear-gradient(135deg,${clr}99,${clr});box-shadow:0 6px 20px ${clr}44">
        ${idx===0?`<span class="pod-crown">👑</span>`:''}
        <span>${(u.email||'?')[0].toUpperCase()}</span>
      </div>
      <div class="pod-name" style="color:${idx===0?'#FDE68A':idx===1?'#CBD5E1':'#CD7F32'}">${maskEmail(u.email)}</div>
      <div class="pod-val" style="color:${pc};margin-bottom:8px">${val}</div>
      <div class="pod-base" style="height:${ht}px;background:linear-gradient(180deg,${pc}22,${pc}08);border:1px solid ${pc}35">
        <span class="pod-rank" style="color:${pc}">${POD_CROWNS[idx]}</span>
      </div>
    </div>`;
  }).join('');
}

/* ── FULL LIST ──────────────────────────────────────────── */
function renderList(data, type) {
  const el = document.getElementById('lbList');
  if (!data.length) { el.innerHTML='<div style="text-align:center;padding:40px;color:var(--ice-3)">Tiada data</div>'; return; }
  const top3html = data.slice(0,3).map(u=>`
    <div class="lb-row" style="opacity:.4;pointer-events:none">
      <div class="lb-num" style="color:${POD_COLORS[[0,1,2].indexOf(data.indexOf(u))]}">${['🥇','🥈','🥉'][data.indexOf(u)]}</div>
      <div style="flex:1;font-size:12px;color:var(--ice-3)">(dalam podium)</div>
    </div>`).join('');
  const resthtml = data.slice(3).map((u,i)=>{
    const rank = MV.getRank(u.total_deposit||0);
    const clr  = RANK_COLORS[rank.id]||'#475569';
    const val  = type==='mvt'?UI.k(u.score)+' MVT':type==='referral'?u.score+' ahli':UI.rm(u.score);
    const isMe = u.id===_user.id;
    return `
    <div class="lb-row ${isMe?'me':''}">
      <div class="lb-num" style="color:var(--ice-3)">${i+4}</div>
      <div class="lb-av" style="background:linear-gradient(135deg,${clr}66,${clr})">${(u.email||'?')[0].toUpperCase()}</div>
      <div class="lb-info">
        <div class="lb-name">${maskEmail(u.email)} ${isMe?'<span style="font-size:9px;color:var(--v-pale);background:var(--v-dim);padding:2px 7px;border-radius:999px;margin-left:4px">SAYA</span>':''}</div>
        <div class="lb-rank">${rank.icon} ${rank.name}</div>
      </div>
      <div>
        <div class="lb-val" style="color:${type==='mvt'?'var(--v-pale)':type==='referral'?'#60A5FA':'var(--profit)'}">${val}</div>
      </div>
    </div>`;
  }).join('');
  el.innerHTML = top3html + resthtml;
}

/* ── MY POSITION ────────────────────────────────────────── */
function findMyPos(data) {
  const myIdx = data.findIndex(u=>u.id===_user.id);
  const chip  = document.getElementById('myRankChip');
  const banner= document.getElementById('myPosBanner');
  if (myIdx>=0) {
    const pos = myIdx+1;
    chip.textContent = '#'+pos+' Saya';
    if (pos>3) {
      banner.style.display='';
      banner.innerHTML=`
        <div class="my-pos">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--v-pale)">#${pos}</div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:700">Kedudukan Saya</div>
            <div style="font-size:10px;color:var(--ice-3)">Top ${((pos/data.length)*100).toFixed(0)}% daripada ${data.length} pengguna</div>
          </div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--v-pale)">${_curType==='mvt'?UI.k(data[myIdx].score)+' MVT':_curType==='referral'?data[myIdx].score+' ahli':UI.rm(data[myIdx].score)}</div>
        </div>`;
    } else banner.style.display='none';
  } else { chip.textContent='—'; banner.style.display='none'; }
}

function maskEmail(email='') {
  const [u,d] = email.split('@');
  if (!u) return '****';
  return u.slice(0,2)+'***@'+(d||'?');
}

/* ── INIT ─────────────────────────────────────────────────── */
async function init() {
  UI.loading();
  const { data:{session} } = await db.auth.getSession();
  if (!session) { location.href='login.html'; return; }
  _user = session.user;
  Lang.init();
  const now = new Date();
  document.getElementById('monthLabel').textContent = now.toLocaleDateString('ms-MY',{month:'long',year:'numeric'});
  await loadLeaderboard('profit');
  UI.unload();
}
window.addEventListener('load',init);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js')
      .catch(e => console.warn('SW reg failed:', e));
  });
}
</script>
</body>
</html>
