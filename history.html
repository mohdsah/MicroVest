<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#020206">
<title>MicroVest v8 | Sejarah</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/v7.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* Summary bar */
.sum-bar { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:8px; padding:0 var(--pad); margin-bottom:18px; }
.sb-box  { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-l); padding:12px 10px; text-align:center; }
.sb-v    { font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:700; display:block; margin-bottom:3px; }
.sb-l    { font-size:7px; letter-spacing:1.5px; text-transform:uppercase; color:var(--ice-3); }

/* Filter chips */
.filter-scroll { display:flex; gap:8px; overflow-x:auto; padding:0 var(--pad) 16px; }
.fc { padding:8px 16px; border-radius:999px; border:1px solid var(--border); background:transparent; color:var(--ice-3); font-size:11px; font-weight:700; cursor:pointer; font-family:'Instrument Sans',sans-serif; white-space:nowrap; flex-shrink:0; transition:.2s; }
.fc.on { color:#fff; }

/* Date group */
.date-group { padding:10px var(--pad) 6px; font-size:9px; letter-spacing:2.5px; text-transform:uppercase; color:var(--ice-3); font-weight:800; }

/* Transaction row */
.tx-row {
  display:flex; align-items:center; gap:13px; padding:14px var(--pad);
  border-bottom:1px solid rgba(255,255,255,.03);
  transition:background .15s; cursor:pointer;
}
.tx-row:active { background:rgba(255,255,255,.02); }
.tx-ico { width:44px; height:44px; border-radius:15px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
.tx-info { flex:1; min-width:0; }
.tx-type { font-size:13px; font-weight:700; margin-bottom:3px; }
.tx-desc { font-size:10px; color:var(--ice-3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tx-right{ text-align:right; flex-shrink:0; }
.tx-amt  { font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:700; }
.tx-st   { font-size:9px; padding:2px 8px; border-radius:999px; margin-top:2px; display:inline-block; }

/* Empty state */
.empty-state { text-align:center; padding:60px 20px; }

/* Detail sheet */
.det-row { display:flex; justify-content:space-between; align-items:center; padding:11px 0; border-bottom:1px solid rgba(255,255,255,.04); }
.det-l   { font-size:12px; color:var(--ice-3); }
.det-v   { font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; text-align:right; }
</style>
</head>
<body>
<div class="amb-v"></div>
<div class="shell">

  <!-- HEADER -->
  <div class="pg-hd anim a1">
    <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <div><div class="pg-title">Sejarah Transaksi</div><div class="pg-sub" id="pgSub">Semua jenis · 60 rekod terkini</div></div>
    <button onclick="exportCSV()" style="margin-left:auto;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--ice-2);padding:8px 13px;border-radius:12px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Instrument Sans',sans-serif">
      <i class="fas fa-download"></i>
    </button>
  </div>

  <!-- SUMMARY BAR -->
  <div class="sum-bar anim a2">
    <div class="sb-box"><span class="sb-v profit" id="sumIn">—</span><span class="sb-l">Masuk</span></div>
    <div class="sb-box"><span class="sb-v loss"   id="sumOut">—</span><span class="sb-l">Keluar</span></div>
    <div class="sb-box"><span class="sb-v gold"   id="sumProfit">—</span><span class="sb-l">Profit</span></div>
    <div class="sb-box"><span class="sb-v v-pale" id="sumTotal">—</span><span class="sb-l">Rekod</span></div>
  </div>

  <!-- FILTER CHIPS -->
  <div class="filter-scroll anim a2">
    <button class="fc on" style="background:var(--v-dim);border-color:var(--v-border);color:var(--v-pale)" onclick="setFilter('all',this)">Semua</button>
    <button class="fc" onclick="setFilter('deposit',this)">💰 Deposit</button>
    <button class="fc" onclick="setFilter('withdraw',this)">💸 Withdraw</button>
    <button class="fc" onclick="setFilter('profit',this)">📈 Profit</button>
    <button class="fc" onclick="setFilter('mining',this)">⛏️ Mining</button>
    <button class="fc" onclick="setFilter('referral',this)">👥 Referral</button>
    <button class="fc" onclick="setFilter('bonus',this)">🎁 Bonus</button>
    <button class="fc" onclick="setFilter('robot',this)">🤖 Robot</button>
    <button class="fc" onclick="setFilter('invest',this)">📊 Invest</button>
  </div>

  <!-- LIST -->
  <div id="txList">
    <div class="skel skel-row anim a1" style="border-radius:16px;margin:0 var(--pad) 8px"></div>
    <div class="skel skel-row anim a2" style="border-radius:16px;margin:0 var(--pad) 8px"></div>
    <div class="skel skel-row anim a3" style="border-radius:16px;margin:0 var(--pad)"></div>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item"><i class="fas fa-house"></i><span>Home</span></a>
  <a href="investment.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Invest</span></a>
  <a href="robots.html" class="nav-item" style="position:relative">
    <span style="position:absolute;top:-3px;left:50%;transform:translateX(-50%);width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#5B21B6,#7C3AED);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(124,58,237,.5);pointer-events:none"></span><i class="fas fa-robot"></i><span>Robot</span></a>
  <a href="mining.html" class="nav-item"><i class="fas fa-microchip"></i><span>Mining</span></a>
  <a href="profile.html" class="nav-item active"><i class="fas fa-user-circle"></i><span>Profil</span></a>
</nav>

<!-- DETAIL SHEET -->
<div id="detSheet"></div>

<script src="js/config.js"></script>
<script src="js/security.js"></script>
<script src="js/ui.js"></script>
<script src="js/lang.js"></script>
<script>
let _user, _allTx=[], _curFilter='all';

const TX_META = {
  deposit:  {icon:'💰', bg:'rgba(34,197,94,.1)',   sign:'+', color:'var(--profit)', label:'Deposit'},
  withdraw: {icon:'💸', bg:'rgba(239,68,68,.08)',   sign:'-', color:'var(--loss)',   label:'Withdraw'},
  profit:   {icon:'📈', bg:'rgba(124,58,237,.1)',   sign:'+', color:'var(--v-pale)', label:'Profit Pelaburan'},
  mining:   {icon:'⛏️', bg:'rgba(249,115,22,.1)',   sign:'+', color:'#FB923C',       label:'Mining Reward'},
  referral: {icon:'👥', bg:'rgba(59,130,246,.1)',   sign:'+', color:'#60A5FA',       label:'Komisyen Referral'},
  bonus:    {icon:'🎁', bg:'rgba(234,179,8,.1)',    sign:'+', color:'var(--gold)',    label:'Ganjaran Bonus'},
  invest:   {icon:'📊', bg:'rgba(124,58,237,.08)',  sign:'-', color:'var(--ice-2)',  label:'Pelaburan'},
};

const ST_CLR = { approved:'var(--profit)', pending:'var(--gold)', rejected:'var(--loss)' };
const ST_BG  = { approved:'rgba(34,197,94,.1)', pending:'rgba(234,179,8,.1)', rejected:'rgba(239,68,68,.1)' };
const ST_ICO = { approved:'✓', pending:'⏳', rejected:'✕' };
const FC_CLR = { deposit:'var(--profit)', withdraw:'rgba(239,68,68,.12)', profit:'rgba(124,58,237,.12)', mining:'rgba(249,115,22,.12)', referral:'rgba(59,130,246,.12)', bonus:'rgba(234,179,8,.12)', robot:'rgba(124,58,237,.25)', invest:'rgba(167,139,250,.2)'};;

/* ── FILTER ─────────────────────────────────────────────── */
function setFilter(type, btn) {
  _curFilter = type;
  document.querySelectorAll('.fc').forEach(b=>{
    b.classList.remove('on');
    b.style.cssText='';
  });
  btn.classList.add('on');
  const clr = FC_CLR[type]||'var(--v-dim)';
  btn.style.background = clr;
  btn.style.borderColor = 'rgba(255,255,255,.1)';
  btn.style.color = '#fff';
  let filtered;
  if (type === 'all')    filtered = _allTx;
  else if (type === 'robot')  filtered = _allTx.filter(t => (t.description||'').toLowerCase().includes('robot') || (t.description||'').toLowerCase().includes('bot'));
  else if (type === 'invest') filtered = _allTx.filter(t => t.type === 'invest');
  else filtered = _allTx.filter(t => t.type === type);
  renderList(filtered);
}

/* ── RENDER ─────────────────────────────────────────────── */
function renderList(txs) {
  const el = document.getElementById('txList');
  document.getElementById('sumTotal').textContent = txs.length;
  document.getElementById('pgSub').textContent    = `${txs.length} rekod · ${_curFilter==='all'?'semua jenis':_curFilter}`;

  if (!txs.length) {
    el.innerHTML=`<div class="empty-state">
      <div style="font-size:52px;margin-bottom:14px">📋</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:8px">Tiada rekod</div>
      <p style="font-size:12px;color:var(--ice-3)">Cuba tukar penapis di atas</p>
    </div>`; return;
  }

  // Group by date
  const groups = {};
  txs.forEach(t => {
    const d = new Date(t.created_at).toLocaleDateString('ms-MY',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
    if (!groups[d]) groups[d]=[];
    groups[d].push(t);
  });

  el.innerHTML = Object.entries(groups).map(([date,items])=>`
    <div class="date-group">${date}</div>
    ${items.map(t => {
      const m = TX_META[t.type]||{icon:'💱',bg:'rgba(255,255,255,.04)',sign:'+',color:'var(--ice)',label:t.type};
      return `
      <div class="tx-row" onclick="showDetail('${t.id}')">
        <div class="tx-ico" style="background:${m.bg}">${m.icon}</div>
        <div class="tx-info">
          <div class="tx-type">${m.label}</div>
          <div class="tx-desc">${t.description||t.bank_name||UI.time(t.created_at)}</div>
        </div>
        <div class="tx-right">
          <div class="tx-amt ${['deposit','profit','mining','referral','bonus'].includes(t.type)?'profit':'loss'}">${m.sign}${UI.rm(t.amount)}</div>
          <span class="tx-st" style="background:${ST_BG[t.status]||''};color:${ST_CLR[t.status]||'var(--ice-3)'}">${ST_ICO[t.status]||''} ${t.status||'—'}</span>
        </div>
      </div>`;
    }).join('')}`).join('');
}

/* ── TX DETAIL SHEET ─────────────────────────────────────── */
function showDetail(txId) {
  const t = _allTx.find(x=>x.id===txId); if (!t) return;
  const m = TX_META[t.type]||{icon:'💱',bg:'rgba(255,255,255,.04)',sign:'+',color:'var(--ice)',label:t.type};
  const c = document.getElementById('detSheet');
  c.innerHTML=`
    <div style="position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(20px);z-index:900;display:flex;align-items:flex-end;justify-content:center" onclick="closeDetail(event)">
      <div style="background:linear-gradient(175deg,#0A0A16,#04040C);border:1px solid rgba(255,255,255,.07);border-radius:28px 28px 0 0;width:min(500px,100%);padding:28px 24px 48px;animation:slide-up .4s cubic-bezier(0.34,1.56,0.64,1) both" onclick="event.stopPropagation()">
        <div style="width:36px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin:0 auto 22px"></div>
        <div style="text-align:center;margin-bottom:22px">
          <div style="font-size:42px;margin-bottom:8px">${m.icon}</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;color:${m.color}">${m.sign}${UI.rm(t.amount)}</div>
          <div style="font-size:12px;color:var(--ice-3);margin-top:4px">${m.label}</div>
        </div>
        <div class="det-row"><span class="det-l">Status</span><span class="det-v" style="color:${ST_CLR[t.status]}">${ST_ICO[t.status]} ${t.status}</span></div>
        <div class="det-row"><span class="det-l">Tarikh</span><span class="det-v">${UI.date(t.created_at)}</span></div>
        <div class="det-row"><span class="det-l">Masa</span><span class="det-v">${UI.time(t.created_at)}</span></div>
        ${t.bank_name?`<div class="det-row"><span class="det-l">Bank</span><span class="det-v">${t.bank_name}</span></div>`:''}
        ${t.account_number?`<div class="det-row"><span class="det-l">No. Akaun</span><span class="det-v">${t.account_number}</span></div>`:''}
        ${t.description?`<div class="det-row"><span class="det-l">Keterangan</span><span class="det-v" style="max-width:180px;text-align:right;font-family:'Instrument Sans',sans-serif">${t.description}</span></div>`:''}
        <div class="det-row" style="border:none"><span class="det-l">ID Transaksi</span><span class="det-v" style="font-size:9px;color:var(--ice-3)">${t.id}</span></div>
        <button onclick="closeDetail(null)" class="btn btn-ghost btn-full" style="margin-top:16px">Tutup</button>
      </div>
    </div>
    <style>@keyframes slide-up{from{transform:translateY(100%)}to{transform:translateY(0)}}</style>`;
}
function closeDetail(e) { if(!e||e.target===e.currentTarget) document.getElementById('detSheet').innerHTML=''; }

/* ── EXPORT CSV ─────────────────────────────────────────── */
function exportCSV() {
  const data = _curFilter==='all' ? _allTx : _allTx.filter(t=>t.type===_curFilter);
  if (!data.length) { UI.toast('Tiada data untuk dieksport','warning'); return; }
  const header = 'Tarikh,Jenis,Jumlah,Status,Keterangan\n';
  const rows   = data.map(t=>`"${UI.date(t.created_at)} ${UI.time(t.created_at)}","${t.type}","${t.amount}","${t.status}","${(t.description||'').replace(/"/g,"'")}"`).join('\n');
  const blob   = new Blob([header+rows], {type:'text/csv;charset=utf-8;'});
  const url    = URL.createObjectURL(blob);
  const a      = document.createElement('a');
  a.href=url; a.download=`microvest-history-${new Date().toISOString().split('T')[0]}.csv`;
  a.click(); URL.revokeObjectURL(url);
  UI.toast('✅ CSV dieksport!','success');
}

/* ── LOAD ALL ────────────────────────────────────────────── */
async function loadAll() {
  UI.loading();
  const { data } = await db.from('transactions').select('*').eq('user_id',_user.id).order('created_at',{ascending:false}).limit(200);
  _allTx = data||[];

  // Compute summary
  const income   = _allTx.filter(t=>['deposit','profit','mining','referral','bonus'].includes(t.type)&&t.status==='approved').reduce((s,t)=>s+(t.amount||0),0);
  const outflow  = _allTx.filter(t=>['withdraw','invest'].includes(t.type)&&t.status!=='rejected').reduce((s,t)=>s+(t.amount||0),0);
  const profitTx = _allTx.filter(t=>['profit','mining','referral','bonus'].includes(t.type)&&t.status==='approved').reduce((s,t)=>s+(t.amount||0),0);
  document.getElementById('sumIn').textContent     = UI.rm(income);
  document.getElementById('sumOut').textContent    = UI.rm(outflow);
  document.getElementById('sumProfit').textContent = UI.rm(profitTx);
  document.getElementById('sumTotal').textContent  = _allTx.length;

  renderList(_allTx);
  UI.unload();
}

/* ── INIT ─────────────────────────────────────────────────── */
async function init() {
  const { data:{session} } = await db.auth.getSession();
  if (!session) { location.href='login.html'; return; }
  _user = session.user;
  Lang.init();
  await loadAll();

  // From URL param ?type=deposit
  const t = new URLSearchParams(location.search).get('type');
  if (t) {
    const btn = [...document.querySelectorAll('.fc')].find(b=>b.getAttribute('onclick')?.includes(`'${t}'`));
    if (btn) setFilter(t, btn);
  }
}
window.addEventListener('load',init);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js')
      .catch(e => console.warn('SW reg failed:', e));
  });
}
</script>
</body>
</html>
