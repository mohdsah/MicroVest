<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#020206">
<title>MicroVest v6 | Log Masuk</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/v6.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body { display:flex; align-items:center; justify-content:center; min-height:100dvh; overflow:hidden; }

/* Animated grid bg */
.grid-bg {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    linear-gradient(rgba(124,58,237,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,58,237,0.025) 1px, transparent 1px);
  background-size:56px 56px;
  animation:grid-drift 20s linear infinite;
}
@keyframes grid-drift { from{background-position:0 0} to{background-position:56px 56px} }

/* Corner glows */
.corner-v { position:fixed; top:-200px; right:-100px; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle, rgba(124,58,237,0.18) 0%, transparent 60%); pointer-events:none; }
.corner-o { position:fixed; bottom:-150px; left:-80px; width:400px; height:400px; border-radius:50%; background:radial-gradient(circle, rgba(249,115,22,0.10) 0%, transparent 60%); pointer-events:none; }

/* Card */
.auth-card {
  position:relative; z-index:1;
  background:rgba(6,6,14,0.97); backdrop-filter:blur(40px);
  border:1px solid rgba(255,255,255,0.07); border-radius:32px;
  padding:40px 32px; width:min(420px, calc(100vw - 32px));
  box-shadow:0 40px 120px rgba(0,0,0,0.8), 0 0 0 1px rgba(124,58,237,0.06);
  animation:rise .6s cubic-bezier(0.34,1.56,0.64,1) both .1s;
}
@keyframes rise { from{opacity:0;transform:translateY(40px) scale(0.95)} to{opacity:1;transform:translateY(0) scale(1)} }

.brand-row { text-align:center; margin-bottom:36px; }
.brand-icon {
  width:70px; height:70px; border-radius:24px; margin:0 auto 14px;
  background:linear-gradient(135deg,#4C1D95,#7C3AED);
  display:flex; align-items:center; justify-content:center; font-size:34px;
  box-shadow:0 14px 40px rgba(124,58,237,0.5);
}
.brand-name {
  font-family:'Bebas Neue',Impact,sans-serif; font-size:28px; letter-spacing:4px;
  background:linear-gradient(90deg,#E2E8FF,#A78BFA);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.brand-sub { font-size:12px; color:var(--ice-3); letter-spacing:1px; margin-top:4px; }

/* Tabs */
.auth-tabs { display:flex; background:rgba(255,255,255,0.03); border-radius:16px; padding:4px; margin-bottom:28px; }
.auth-tab {
  flex:1; padding:11px; border-radius:12px; border:none; background:transparent;
  color:var(--ice-3); font-family:'Instrument Sans',sans-serif; font-weight:700; font-size:13px;
  cursor:pointer; transition:.25s;
}
.auth-tab.on { background:linear-gradient(135deg,#5B21B6,#7C3AED); color:#fff; box-shadow:0 4px 18px rgba(124,58,237,0.4); }

/* Input row */
.inp-wrap { position:relative; margin-bottom:14px; }
.inp-icon {
  position:absolute; left:16px; top:50%; transform:translateY(-50%);
  color:var(--ice-3); font-size:14px; pointer-events:none;
}
.inp-field {
  width:100%; background:rgba(10,10,22,0.98); border:1px solid rgba(255,255,255,0.06);
  color:var(--ice); padding:15px 18px 15px 44px; border-radius:var(--r-m);
  font-family:'Instrument Sans',sans-serif; font-size:14px; font-weight:600; outline:none;
  transition:border-color .25s, box-shadow .25s;
}
.inp-field::placeholder { color:var(--ice-3); }
.inp-field:focus { border-color:rgba(124,58,237,0.45); box-shadow:0 0 0 3px rgba(124,58,237,0.1); }

.eye-btn {
  position:absolute; right:14px; top:50%; transform:translateY(-50%);
  background:none; border:none; color:var(--ice-3); cursor:pointer; font-size:14px; padding:4px;
}

/* Submit btn */
.submit-btn {
  width:100%; padding:16px; border-radius:var(--r-m);
  background:linear-gradient(135deg,#5B21B6,#7C3AED); color:#fff;
  font-family:'Instrument Sans',sans-serif; font-weight:800; font-size:15px;
  border:none; cursor:pointer; margin-top:8px;
  transition:transform .2s var(--spring), box-shadow .2s;
  box-shadow:0 10px 30px rgba(124,58,237,0.4);
}
.submit-btn:hover { box-shadow:0 14px 40px rgba(124,58,237,0.55); }
.submit-btn:active { transform:scale(0.96); }
.submit-btn:disabled { opacity:0.5; cursor:default; transform:none; }

/* Divider */
.or-div { display:flex; align-items:center; gap:12px; margin:18px 0; color:var(--ice-3); font-size:11px; }
.or-div::before,.or-div::after { content:''; flex:1; height:1px; background:var(--border-hi); }

/* Social / register link */
.switch-link { text-align:center; font-size:13px; color:var(--ice-2); margin-top:18px; }
.switch-link a { color:var(--v-pale); font-weight:700; text-decoration:none; }

/* Referral field (register only) */
.ref-note { font-size:11px; color:var(--ice-3); text-align:center; margin-top:6px; }

/* Error text */
.err-msg { color:#EF4444; font-size:12px; margin-top:-8px; margin-bottom:10px; padding:0 4px; }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="corner-v"></div>
<div class="corner-o"></div>

<div class="auth-card">
  <div class="brand-row">
    <div class="brand-icon">⚡</div>
    <div class="brand-name">MICROVEST</div>
    <div class="brand-sub">Platform Pelaburan Premium v6</div>
  </div>

  <!-- TABS -->
  <div class="auth-tabs">
    <button class="auth-tab on" id="tab-login" onclick="switchTab('login')">Log Masuk</button>
    <button class="auth-tab" id="tab-reg" onclick="switchTab('reg')">Daftar</button>
  </div>

  <!-- LOGIN FORM -->
  <div id="formLogin">
    <div class="inp-wrap">
      <i class="fas fa-envelope inp-icon"></i>
      <input class="inp-field" id="loginEmail" type="email" placeholder="Alamat emel anda" autocomplete="email">
    </div>
    <div class="inp-wrap">
      <i class="fas fa-lock inp-icon"></i>
      <input class="inp-field" id="loginPw" type="password" placeholder="Kata laluan" autocomplete="current-password">
      <button class="eye-btn" onclick="togglePw('loginPw','loginEye')" id="loginEye"><i class="fas fa-eye-slash"></i></button>
    </div>
    <div style="text-align:right;margin-bottom:16px">
      <a href="forgot.html" style="font-size:12px;color:var(--v-pale);text-decoration:none;font-weight:700">Lupa kata laluan?</a>
    </div>
    <div class="err-msg hidden" id="loginErr"></div>
    <button class="submit-btn" id="loginBtn" onclick="doLogin()">
      <span id="loginBtnTxt">Log Masuk →</span>
    </button>
  </div>

  <!-- REGISTER FORM -->
  <div id="formReg" style="display:none">
    <div class="inp-wrap">
      <i class="fas fa-envelope inp-icon"></i>
      <input class="inp-field" id="regEmail" type="email" placeholder="Alamat emel anda" autocomplete="email">
    </div>
    <div class="inp-wrap">
      <i class="fas fa-lock inp-icon"></i>
      <input class="inp-field" id="regPw" type="password" placeholder="Kata laluan (min 8 aksara)" autocomplete="new-password">
      <button class="eye-btn" onclick="togglePw('regPw','regEye')" id="regEye"><i class="fas fa-eye-slash"></i></button>
    </div>
    <div class="inp-wrap">
      <i class="fas fa-lock inp-icon"></i>
      <input class="inp-field" id="regPw2" type="password" placeholder="Ulang kata laluan">
    </div>
    <div class="inp-wrap">
      <i class="fas fa-users inp-icon"></i>
      <input class="inp-field" id="regRef" type="text" placeholder="Kod referral (pilihan)" autocomplete="off" style="text-transform:uppercase">
    </div>
    <div class="ref-note">Masukkan kod referral untuk bonus pendaftaran</div>
    <div class="err-msg hidden" id="regErr" style="margin-top:10px"></div>

    <div style="display:flex;align-items:flex-start;gap:10px;margin:16px 0 6px">
      <input type="checkbox" id="regAgree" style="width:16px;height:16px;margin-top:2px;accent-color:#7C3AED">
      <label for="regAgree" style="font-size:12px;color:var(--ice-2);cursor:pointer;line-height:1.6">
        Saya bersetuju dengan <a href="#" style="color:var(--v-pale)">Terma & Syarat</a> dan <a href="#" style="color:var(--v-pale)">Dasar Privasi</a> MicroVest
      </label>
    </div>
    <button class="submit-btn" id="regBtn" onclick="doRegister()">
      <span id="regBtnTxt">Buat Akaun →</span>
    </button>
  </div>

  <div class="switch-link">
    <span id="switchTxt">Belum ada akaun?</span>
    <a href="#" onclick="switchTab(document.getElementById('tab-login').classList.contains('on')?'reg':'login');return false" id="switchLnk">Daftar sekarang</a>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/ui.js"></script>
<script src="js/lang.js"></script>
<script>
/* ── AUTO-FILL REF FROM URL ?ref=CODE ─────────────────── */
window.addEventListener('load', async () => {
  const params = new URLSearchParams(location.search);
  const ref = params.get('ref');
  if (ref) document.getElementById('regRef').value = ref.toUpperCase();

  // Check if already logged in
  const { data:{ session } } = await db.auth.getSession();
  if (session) location.href = 'dashboard.html';

  // Auto-switch to register if ?register=1
  if (params.get('register') === '1') switchTab('reg');
});

/* ── TAB SWITCH ─────────────────────────────────────────── */
function switchTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('tab-login').className = 'auth-tab' + (isLogin?' on':'');
  document.getElementById('tab-reg').className   = 'auth-tab' + (!isLogin?' on':'');
  document.getElementById('formLogin').style.display = isLogin ? '' : 'none';
  document.getElementById('formReg').style.display   = isLogin ? 'none' : '';
  document.getElementById('switchTxt').textContent   = isLogin ? 'Belum ada akaun?' : 'Sudah ada akaun?';
  document.getElementById('switchLnk').textContent   = isLogin ? 'Daftar sekarang' : 'Log masuk';
}

/* ── TOGGLE PASSWORD ─────────────────────────────────────── */
function togglePw(fieldId, btnId) {
  const f = document.getElementById(fieldId);
  const b = document.getElementById(btnId).querySelector('i');
  const show = f.type === 'password';
  f.type = show ? 'text' : 'password';
  b.className = show ? 'fas fa-eye' : 'fas fa-eye-slash';
}

/* ── SHOW ERROR ──────────────────────────────────────────── */
function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.remove('hidden');
}
function clearErr(id) { document.getElementById(id).classList.add('hidden'); }

/* ── LOGIN ───────────────────────────────────────────────── */
async function doLogin() {
  clearErr('loginErr');
  const email = document.getElementById('loginEmail').value.trim();
  const pw    = document.getElementById('loginPw').value;
  if (!email) { showErr('loginErr','Masukkan emel anda'); return; }
  if (!pw)    { showErr('loginErr','Masukkan kata laluan'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  document.getElementById('loginBtnTxt').innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:8px"></i>Sedang Log Masuk...';

  const { error } = await db.auth.signInWithPassword({ email, password: pw });

  if (error) {
    btn.disabled = false;
    document.getElementById('loginBtnTxt').textContent = 'Log Masuk →';
    const msg = error.message.includes('Invalid') ? 'Emel atau kata laluan salah!' : error.message;
    showErr('loginErr', '⚠️ ' + msg);
    return;
  }

  // Update last login
  const { data:{ user } } = await db.auth.getUser();
  await db.from('profiles').update({
    last_login: new Date().toISOString(),
    last_login_date: new Date().toISOString().split('T')[0],
  }).eq('id', user.id);

  // Log login
  await db.from('login_logs').insert([{
    user_id:    user.id,
    user_agent: navigator.userAgent,
    device_type: /Mobile/.test(navigator.userAgent) ? 'mobile' : 'desktop',
  }]).catch(() => {});

  document.getElementById('loginBtnTxt').textContent = '✅ Berjaya!';
  setTimeout(() => { location.href = 'dashboard.html'; }, 600);
}

/* ── REGISTER ────────────────────────────────────────────── */
async function doRegister() {
  clearErr('regErr');
  const email  = document.getElementById('regEmail').value.trim();
  const pw     = document.getElementById('regPw').value;
  const pw2    = document.getElementById('regPw2').value;
  const ref    = document.getElementById('regRef').value.trim().toUpperCase();
  const agreed = document.getElementById('regAgree').checked;

  if (!email)         { showErr('regErr','Masukkan emel anda'); return; }
  if (pw.length < 8)  { showErr('regErr','Kata laluan minimum 8 aksara'); return; }
  if (pw !== pw2)     { showErr('regErr','Kata laluan tidak sepadan'); return; }
  if (!agreed)        { showErr('regErr','Sila bersetuju dengan terma'); return; }

  // Validate ref code if entered
  if (ref) {
    const { data: refUser } = await db.from('profiles').select('id').eq('referral_code', ref).single();
    if (!refUser) { showErr('regErr','Kod referral tidak sah'); return; }
  }

  const btn = document.getElementById('regBtn');
  btn.disabled = true;
  document.getElementById('regBtnTxt').innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:8px"></i>Mendaftar...';

  const { data, error } = await db.auth.signUp({ email, password: pw });

  if (error) {
    btn.disabled = false;
    document.getElementById('regBtnTxt').textContent = 'Buat Akaun →';
    showErr('regErr', '⚠️ ' + error.message);
    return;
  }

  // Create profile
  const userId = data.user.id;
  const refCode = email.split('@')[0].slice(0,4).toUpperCase() + Math.random().toString(36).substring(2,6).toUpperCase();

  await db.from('profiles').upsert([{
    id:            userId,
    email:         email,
    balance:       0,
    referral_code: refCode,
    referral_by:   ref || null,
    vip_rank:     'member',
    mvt_balance:   10,          // Welcome bonus 10 MVT
    xp:            0,
  }]);

  // Create wallets
  await db.from('wallets').insert([
    { user_id:userId, wallet_type:'main',   balance:0 },
    { user_id:userId, wallet_type:'mining', balance:0 },
    { user_id:userId, wallet_type:'bonus',  balance:0 },
  ]).catch(() => {});

  // Welcome notification
  await db.from('notifications').insert([{
    user_id: userId, type:'welcome',
    message: `🎉 Selamat datang ke MicroVest! Akaun anda berjaya dibuat. Anda dapat 10 MVT token sebagai hadiah selamat datang!`,
  }]).catch(() => {});

  // Referral bonus to referrer
  if (ref) {
    const { data: referrer } = await db.from('profiles').select('id, balance').eq('referral_code', ref).single();
    if (referrer) {
      await db.from('profiles').update({ balance: (referrer.balance||0) + 1 }).eq('id', referrer.id);
      await db.from('notifications').insert([{
        user_id: referrer.id, type:'referral',
        message: `👥 Rakan baru ${email} berdaftar dengan kod referral anda! +RM1 bonus.`,
      }]).catch(() => {});
    }
  }

  document.getElementById('regBtnTxt').textContent = '✅ Akaun Dibuat!';
  setTimeout(() => { location.href = 'dashboard.html'; }, 700);
}

/* ── ENTER KEY ───────────────────────────────────────────── */
Lang.init();
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('formLogin').style.display !== 'none') doLogin();
  else doRegister();
});
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js')
      .catch(e => console.warn('SW reg failed:', e));
  });
}
</script>
</body>
</html>
