<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#020206">
<title>MicroVest v6 | Mining</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/v6.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* Mining hero */
.mine-hero {
  margin: 0 var(--pad) 22px;
  background: linear-gradient(135deg,#1A0600,#0A0300);
  border: 1px solid rgba(249,115,22,.3); border-radius: 28px;
  padding: 24px; position: relative; overflow: hidden;
}
.mine-hero::before {
  content: ''; position: absolute; top: -60px; right: -60px;
  width: 200px; height: 200px; border-radius: 50%;
  background: radial-gradient(rgba(249,115,22,.15),transparent 60%);
}
.mh-val { font-family:'JetBrains Mono',monospace; font-size:32px; font-weight:700; color:#FB923C; display:block; }
.mh-sub { font-size:11px; color:rgba(253,186,116,.5); letter-spacing:2px; text-transform:uppercase; margin-top:4px; }
.mh-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:18px; }
.mh-s { background:rgba(0,0,0,.35); border-radius:12px; padding:12px; text-align:center; }
.mh-sv { font-family:'JetBrains Mono',monospace; font-size:15px; font-weight:700; color:#FDBA74; display:block; margin-bottom:3px; }
.mh-sl { font-size:8px; letter-spacing:2px; text-transform:uppercase; opacity:.45; }

/* Tab bar */
.tab-bar { display:flex; gap:6px; padding:0 var(--pad); margin-bottom:20px;
  position:sticky; top:72px; z-index:100;
  background:linear-gradient(rgba(2,2,6,.97) 80%,transparent); padding-bottom:12px; }
.tb-btn { flex:1; padding:11px; border-radius:14px; border:1px solid var(--border);
  background:transparent; color:var(--ice-3); font-family:'Instrument Sans',sans-serif;
  font-weight:700; font-size:12px; cursor:pointer; transition:.2s; }
.tb-btn.on { background:rgba(249,115,22,.1); border-color:rgba(249,115,22,.3); color:#FB923C; }

/* Machine shop card */
.machine-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius: 24px; padding: 20px; margin: 0 var(--pad) 12px;
  position: relative; overflow: hidden; cursor: pointer;
  transition: border-color .2s, transform .2s var(--spring);
}
.machine-card:active { transform: scale(0.97); }
.machine-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
.mc-fan { background:linear-gradient(135deg,#060F1A,#030A12); border-color:rgba(96,165,250,.25); }
.mc-fan::before { background:linear-gradient(90deg,transparent,#60A5FA,transparent); }
.mc-asic{ background:linear-gradient(135deg,#0E0800,#180E00); border-color:rgba(249,115,22,.3); }
.mc-asic::before{ background:linear-gradient(90deg,transparent,#F97316,transparent); }
.mc-rack{ background:linear-gradient(135deg,#040D08,#021108); border-color:rgba(34,197,94,.25); }
.mc-rack::before{ background:linear-gradient(90deg,transparent,#22C55E,transparent); }
.mc-farm{ background:linear-gradient(135deg,#10001E,#08001A); border-color:rgba(124,58,237,.35); box-shadow:0 10px 35px rgba(124,58,237,.08); }
.mc-farm::before{ background:linear-gradient(90deg,transparent,#7C3AED,transparent); }
.mc-mega{ background:linear-gradient(135deg,#1A0800,#0A0300); border-color:rgba(251,146,60,.4); box-shadow:0 12px 40px rgba(249,115,22,.1); }
.mc-mega::before{ background:linear-gradient(90deg,transparent,#FB923C,transparent); }

.mc-top { display:flex; align-items:center; gap:14px; margin-bottom:16px; }
.mc-icon { font-size:36px; flex-shrink:0; }
.mc-name { font-family:'DM Serif Display',serif; font-size:18px; flex:1; }
.mc-count-badge { background:rgba(249,115,22,.15); border:1px solid rgba(249,115,22,.3); color:#FB923C; font-size:9px; font-weight:800; padding:3px 10px; border-radius:999px; }
.mc-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; margin-bottom:16px; }
.ms-box { background:rgba(0,0,0,.35); border-radius:10px; padding:9px 6px; text-align:center; }
.ms-v { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; display:block; margin-bottom:2px; }
.ms-l { font-size:7px; letter-spacing:1.5px; text-transform:uppercase; opacity:.45; }

/* Active machine row */
.active-machine {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-xl); padding:18px; margin:0 var(--pad) 12px;
  position:relative; overflow:hidden;
}
.am-top { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.am-indicator { width:8px; height:8px; border-radius:50%; flex-shrink:0; animation:blink 1.8s ease-in-out infinite; }
.am-name { font-size:14px; font-weight:700; flex:1; }
.am-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:14px; }
.as-box { background:rgba(255,255,255,.04); border-radius:10px; padding:10px; text-align:center; }
.as-v { font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:700; display:block; margin-bottom:2px; }
.as-l { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--ice-3); }

/* Claim all banner */
.claim-banner {
  margin:0 var(--pad) 18px;
  background:linear-gradient(135deg,rgba(34,197,94,.12),rgba(34,197,94,.05));
  border:1px solid rgba(34,197,94,.25); border-radius:var(--r-xl);
  padding:18px 20px; display:flex; align-items:center; gap:14px;
  cursor:pointer; transition:.2s var(--spring);
}
.claim-banner:active { transform:scale(0.97); }
</style>
</head>
<body>
<div class="amb-v"></div><div class="amb-o"></div>
<div class="shell">

  <!-- HEADER -->
  <div class="pg-hd anim a1">
    <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <div><div class="pg-title">Mining Center</div><div class="pg-sub">Mesin Automatik · 24 Jam</div></div>
    <div style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:#FB923C" id="hdrMining">—</div>
  </div>

  <!-- MINING HERO -->
  <div class="mine-hero anim a2">
    <span class="mh-val" id="heroTotal">RM 0.00</span>
    <span class="mh-sub">Pendapatan Mining Kumulatif</span>
    <div class="mh-stats">
      <div class="mh-s"><span class="mh-sv" id="heroMachines">0</span><span class="mh-sl">Mesin Aktif</span></div>
      <div class="mh-s"><span class="mh-sv" id="heroDaily">RM 0</span><span class="mh-sl">Per Hari</span></div>
      <div class="mh-s"><span class="mh-sv" id="heroPending">RM 0</span><span class="mh-sl">Belum Claim</span></div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tab-bar anim a2">
    <button class="tb-btn on" id="tb-shop"   onclick="switchTab('shop')">🛒 Kedai</button>
    <button class="tb-btn"   id="tb-mine"    onclick="switchTab('mine')">⛏️ Mesin Saya</button>
    <button class="tb-btn"   id="tb-history" onclick="switchTab('history')">📂 Rekod</button>
  </div>

  <!-- ── SHOP ──────────────────────────────── -->
  <div id="view-shop">
    <div id="shopCards"></div>
  </div>

  <!-- ── MY MACHINES ───────────────────────── -->
  <div id="view-mine" style="display:none">
    <div id="claimBanner" style="display:none">
      <div class="claim-banner" onclick="claimAll()">
        <div style="font-size:28px">💰</div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:800;color:var(--profit)">Reward Tersedia!</div>
          <div style="font-size:11px;color:var(--ice-2);margin-top:2px" id="claimBannerAmt">Klik untuk claim semua</div>
        </div>
        <i class="fas fa-chevron-right" style="color:var(--profit)"></i>
      </div>
    </div>
    <div id="machineList">
      <div class="skel skel-row anim a1" style="border-radius:22px;margin:0 var(--pad) 12px"></div>
      <div class="skel skel-row anim a2" style="border-radius:22px;margin:0 var(--pad)"></div>
    </div>
  </div>

  <!-- ── HISTORY ───────────────────────────── -->
  <div id="view-history" style="display:none;padding:0 var(--pad)">
    <div id="histList">
      <div class="skel skel-row" style="border-radius:14px;margin-bottom:8px"></div>
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item"><i class="fas fa-house"></i><span>Home</span></a>
  <a href="investment.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Invest</span></a>
  <a href="robots.html" class="nav-item" style="position:relative">
    <span style="position:absolute;top:-3px;left:50%;transform:translateX(-50%);width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#5B21B6,#7C3AED);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(124,58,237,.5);pointer-events:none"></span><i class="fas fa-robot"></i><span>Robot</span></a>
  <a href="mining.html" class="nav-item active"><i class="fas fa-microchip"></i><span>Mining</span></a>
  <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i><span>Profil</span></a>
</nav>

<!-- BUY MODAL -->
<div id="buyModal" style="display:none"></div>

<script src="js/config.js"></script>
<script src="js/ui.js"></script>
<script src="js/automation.js"></script>
<script src="js/lang.js"></script>
<script src="js/realtime.js"></script>
<script>
let _user, _profile, _myMachines = [];

const MC_CLASS = { fan:'mc-fan', asic:'mc-asic', rack:'mc-rack', farm:'mc-farm', mega:'mc-mega' };
const MC_CLR   = { fan:'#60A5FA', asic:'#F97316', rack:'#22C55E', farm:'#A78BFA', mega:'#FB923C' };

/* ── TAB ─────────────────────────────────────────────────── */
function switchTab(t) {
  ['shop','mine','history'].forEach(k => {
    document.getElementById('tb-'+k).className     = 'tb-btn'+(t===k?' on':'');
    document.getElementById('view-'+k).style.display = t===k?'':'none';
  });
  if (t==='mine')    loadMyMachines();
  if (t==='history') loadHistory();
}

/* ── SHOP CARDS ─────────────────────────────────────────── */
function renderShop() {
  const el = document.getElementById('shopCards');
  el.innerHTML = MV.MACHINES.map(m => {
    const clr = MC_CLR[m.id]||'#FB923C';
    const daily = m.price * m.dailyRate;
    const roi   = (m.durationDays * m.dailyRate * 100).toFixed(0);
    const owned = _myMachines.filter(x=>x.machine_id===m.id).length;
    return `
    <div class="machine-card ${MC_CLASS[m.id]||''}" onclick="openBuy('${m.id}')">
      <div class="mc-top">
        <div class="mc-icon">${m.icon}</div>
        <div>
          <div class="mc-name">${m.name}</div>
          <div style="font-size:10px;color:var(--ice-3)">${m.durationDays} hari · Auto Claim 24j</div>
        </div>
        ${owned?`<span class="mc-count-badge">×${owned}</span>`:''}
      </div>
      <div class="mc-stats">
        <div class="ms-box"><span class="ms-v" style="color:${clr}">RM${m.price}</span><span class="ms-l">Harga</span></div>
        <div class="ms-box"><span class="ms-v profit">+${UI.rm(daily)}</span><span class="ms-l">/ Hari</span></div>
        <div class="ms-box"><span class="ms-v gold">${roi}%</span><span class="ms-l">ROI</span></div>
        <div class="ms-box"><span class="ms-v">${m.durationDays}d</span><span class="ms-l">Tempoh</span></div>
      </div>
      <button class="btn btn-full" style="background:${clr}18;color:${clr};border:1px solid ${clr}35;font-weight:800">
        🛒 Beli Mesin →
      </button>
    </div>`;
  }).join('');
}

/* ── BUY MODAL ──────────────────────────────────────────── */
function openBuy(machId) {
  const m = MV.MACHINES.find(x=>x.id===machId); if (!m) return;
  const clr   = MC_CLR[m.id]||'#FB923C';
  const daily = m.price * m.dailyRate;
  const total = daily * m.durationDays;
  const boost = _profile?.vip_rank ? (MV.getRank(_profile?.total_deposit||0).miningBoost||1) : 1;
  const bDaily= daily * boost;

  document.getElementById('buyModal').style.display='flex';
  document.getElementById('buyModal').innerHTML = `
    <div style="position:fixed;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(22px);z-index:900;display:flex;align-items:flex-end;justify-content:center" onclick="closeBuy(event)">
      <div style="background:linear-gradient(175deg,#0A0A16,#04040C);border:1px solid rgba(255,255,255,.07);border-radius:28px 28px 0 0;width:min(500px,100%);padding:28px 24px 48px;animation:slide-up .42s cubic-bezier(0.34,1.56,0.64,1) both" onclick="event.stopPropagation()">
        <div style="width:40px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin:0 auto 20px"></div>
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:22px">
          <div style="font-size:40px">${m.icon}</div>
          <div>
            <div style="font-family:'DM Serif Display',serif;font-size:20px">${m.name}</div>
            <div style="font-size:11px;color:var(--ice-3)">Auto-mining ${m.durationDays} hari</div>
          </div>
        </div>

        <div style="background:rgba(249,115,22,.06);border:1px solid rgba(249,115,22,.18);border-radius:var(--r-l);padding:16px;margin-bottom:20px">
          <div style="display:flex;justify-content:space-between;padding:5px 0"><span style="font-size:12px;color:var(--ice-2)">Harga Mesin</span><span style="font-family:'JetBrains Mono',monospace;font-weight:700">RM ${m.price}</span></div>
          <div style="display:flex;justify-content:space-between;padding:5px 0"><span style="font-size:12px;color:var(--ice-2)">Profit Harian</span><span style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--profit)">+RM ${daily.toFixed(2)}</span></div>
          ${boost>1?`<div style="display:flex;justify-content:space-between;padding:5px 0"><span style="font-size:12px;color:var(--ice-2)">Bonus VIP (×${boost})</span><span style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--gold)">+RM ${bDaily.toFixed(2)}/hari</span></div>`:''}
          <div style="display:flex;justify-content:space-between;padding:5px 0"><span style="font-size:12px;color:var(--ice-2)">Total Pulangan</span><span style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--gold)">RM ${(total*boost).toFixed(2)}</span></div>
          <div style="height:1px;background:var(--border);margin:8px 0"></div>
          <div style="display:flex;justify-content:space-between;padding:5px 0"><span style="font-size:13px;font-weight:800">Baki Semasa</span><span style="font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--v-pale)">${UI.rm(_profile?.balance||0)}</span></div>
        </div>

        <button class="btn btn-full btn-lg" style="background:linear-gradient(135deg,${clr}30,${clr}18);color:${clr};border:1px solid ${clr}40;font-weight:800" onclick="confirmBuy('${m.id}',${m.price})">
          ⛏️ Beli & Aktifkan Sekarang
        </button>
        <button onclick="closeBuy()" style="width:100%;margin-top:10px;padding:12px;background:none;border:none;color:var(--ice-3);font-weight:700;cursor:pointer;font-family:'Instrument Sans',sans-serif">Batal</button>
      </div>
    </div>
    <style>@keyframes slide-up{from{transform:translateY(100%)}to{transform:translateY(0)}}</style>`;
}

function closeBuy(e) {
  if (!e || e.target===e.currentTarget) {
    document.getElementById('buyModal').style.display='none';
    document.getElementById('buyModal').innerHTML='';
  }
}

async function confirmBuy(machId, price) {
  const m = MV.MACHINES.find(x=>x.id===machId);
  const { data:pr } = await db.from('profiles').select('balance,total_deposit').eq('id',_user.id).single();
  if ((pr?.balance||0) < price) { UI.toast('Baki tidak mencukupi!','error'); return; }

  UI.loading('Mengaktifkan mesin...');
  const rank  = MV.getRank(pr?.total_deposit||0);
  const boost = rank.miningBoost||1;
  const daily = price * m.dailyRate * boost;
  const endAt = new Date(Date.now()+m.durationDays*86400000);

  await db.from('profiles').update({ balance:(pr.balance||0)-price }).eq('id',_user.id);
  await db.from('user_machines').insert([{
    user_id:      _user.id,
    machine_id:   machId,
    daily_profit: daily,
    total_earned: 0,
    status:       'active',
    end_at:       endAt.toISOString(),
  }]);

  await db.from('transactions').insert([{ user_id:_user.id, type:'mining', amount:price, status:'approved', description:`Beli mesin ${m.name}` }]);

  await db.from('notifications').insert([{
    user_id:_user.id, type:'mining',
    message:`⛏️ Mesin ${m.icon} ${m.name} berjaya diaktifkan! Dapat +RM${daily.toFixed(2)}/hari selama ${m.durationDays} hari.`,
  }]);

  await Auto.processReferralChain(_user.id, price, 'mining');

  _profile.balance = (pr.balance||0)-price;
  closeBuy(null);
  UI.unload();
  UI.toast(`✅ ${m.name} diaktifkan! +RM${daily.toFixed(2)}/hari`,'success',4000);
  loadHeroStats();
  renderShop();
  switchTab('mine');
}

/* ── MY MACHINES ─────────────────────────────────────────── */
async function loadMyMachines() {
  const el = document.getElementById('machineList');
  UI.skeleton(el,3,'card');
  const { data } = await db.from('user_machines').select('*').eq('user_id',_user.id).eq('status','active').order('created_at',{ascending:false});
  _myMachines = data||[];

  // Claim banner
  const canClaim = _myMachines.filter(m => !m.last_claimed_at || (Date.now()-new Date(m.last_claimed_at)) >= 23.5*3600000);
  const totalPending = canClaim.reduce((s,m)=>s+(m.daily_profit||0),0);

  const banner = document.getElementById('claimBanner');
  if (canClaim.length) {
    banner.style.display='';
    document.getElementById('claimBannerAmt').textContent = `${canClaim.length} mesin · +${UI.rm(totalPending)} siap dituntut`;
  } else banner.style.display='none';

  if (!_myMachines.length) {
    el.innerHTML = `<div style="text-align:center;padding:40px 20px">
      <div style="font-size:52px;margin-bottom:14px">⛏️</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:8px">Tiada mesin aktif</div>
      <p style="font-size:12px;color:var(--ice-3);margin-bottom:20px">Beli mesin untuk mula menjana profit automatik</p>
      <button onclick="switchTab('shop')" class="btn" style="background:rgba(249,115,22,.12);color:#FB923C;border:1px solid rgba(249,115,22,.25)">Beli Mesin →</button>
    </div>`; return;
  }

  el.innerHTML = _myMachines.map(m => {
    const mc    = MV.MACHINES.find(x=>x.id===m.machine_id)||{icon:'⛏️',name:m.machine_id};
    const clr   = MC_CLR[m.machine_id]||'#FB923C';
    const pct   = Math.min(((Date.now()-new Date(m.created_at))/(new Date(m.end_at)-new Date(m.created_at)))*100,100);
    const canCl = !m.last_claimed_at || (Date.now()-new Date(m.last_claimed_at)) >= 23.5*3600000;
    const nextIn= m.last_claimed_at ? Math.max(0,(new Date(m.last_claimed_at).getTime()+24*3600000)-Date.now()) : 0;
    const hrs   = Math.floor(nextIn/3600000), mins=Math.floor((nextIn%3600000)/60000);
    return `
    <div class="active-machine" style="border-left:3px solid ${clr}">
      <div class="am-top">
        <div style="font-size:28px">${mc.icon}</div>
        <div class="am-indicator" style="background:${canCl?'var(--profit)':clr}"></div>
        <div style="flex:1">
          <div class="am-name">${mc.name}</div>
          <div style="font-size:10px;color:var(--ice-3)">Tamat ${UI.date(m.end_at)} · ${UI.countdown(m.end_at)} lagi</div>
        </div>
      </div>
      <div class="am-stats">
        <div class="as-box"><span class="as-v" style="color:${clr}">+${UI.rm(m.daily_profit)}</span><span class="as-l">/ Hari</span></div>
        <div class="as-box"><span class="as-v profit">${UI.rm(m.total_earned||0)}</span><span class="as-l">Earned</span></div>
        <div class="as-box"><span class="as-v" style="color:var(--ice-2)">${pct.toFixed(0)}%</span><span class="as-l">Progress</span></div>
      </div>
      <div style="margin-bottom:12px">
        <div class="prog-t"><div class="prog-f" style="width:${pct.toFixed(0)}%;background:${clr}"></div></div>
      </div>
      <button class="btn btn-full ${canCl?'btn-profit':'btn-ghost'}"
        onclick="${canCl?`claimMachine('${m.id}',${m.daily_profit},'${mc.name}')`:'void(0)'}"
        ${canCl?'':'disabled'} style="opacity:${canCl?1:.5}">
        ${canCl?`💰 Claim +RM${(m.daily_profit).toFixed(2)} Sekarang`:`⏳ Claim dalam ${hrs}j ${mins}m`}
      </button>
    </div>`;
  }).join('');
}

async function claimMachine(mId, amount, name) {
  UI.loading();
  const { data:m } = await db.from('user_machines').select('last_claimed_at,total_earned').eq('id',mId).single();
  if (m?.last_claimed_at && (Date.now()-new Date(m.last_claimed_at))<23.5*3600000) {
    UI.unload(); UI.toast('Sudah claim hari ini!','warning'); return;
  }
  await RPC.creditProfit(_user.id, amount);
  await db.from('user_machines').update({ last_claimed_at:new Date().toISOString(), total_earned:(m?.total_earned||0)+amount }).eq('id',mId);
  await db.from('transactions').insert([{ user_id:_user.id, type:'mining', amount, status:'approved', description:`Mining reward: ${name}` }]);
  const mvt = Math.floor(amount * MV.TOKEN.miningRate);
  await RPC.incMVT(_user.id, mvt);
  UI.unload();
  UI.toast(`✅ +RM${amount.toFixed(2)} +${mvt} MVT dari ${name}!`,'success');
  loadMyMachines(); loadHeroStats();
}

async function claimAll() {
  const claimable = _myMachines.filter(m => !m.last_claimed_at || (Date.now()-new Date(m.last_claimed_at)) >= 23.5*3600000);
  if (!claimable.length) { UI.toast('Tiada reward untuk dituntut','warning'); return; }
  const total = claimable.reduce((s,m)=>s+(m.daily_profit||0),0);
  UI.confirm('Claim Semua','Claim semua reward mining sekarang?', async ()=>{
    UI.loading('Claim semua...');
    const { data:pr } = await db.from('profiles').select('balance,total_earned').eq('id',_user.id).single();
    let bal = pr?.balance||0, earned=pr?.total_earned||0;
    for (const m of claimable) {
      const { data:rec } = await db.from('user_machines').select('total_earned').eq('id',m.id).single();
      await db.from('user_machines').update({ last_claimed_at:new Date().toISOString(), total_earned:(rec?.total_earned||0)+m.daily_profit }).eq('id',m.id);
      bal+=m.daily_profit; earned+=m.daily_profit;
    }
    await db.from('profiles').update({ balance:bal, total_earned:earned }).eq('id',_user.id);
    await db.from('transactions').insert([{ user_id:_user.id, type:'mining', amount:total, status:'approved', description:`Claim semua mining (${claimable.length} mesin)` }]);
    UI.unload();
    UI.toast(`✅ +RM${total.toFixed(2)} dari ${claimable.length} mesin!`,'success',5000);
    loadMyMachines(); loadHeroStats();
  },'Claim Semua');
}

/* ── HISTORY ─────────────────────────────────────────────── */
async function loadHistory() {
  const el = document.getElementById('histList');
  UI.skeleton(el,4,'row');
  const { data } = await db.from('transactions').select('*').eq('user_id',_user.id).eq('type','mining').order('created_at',{ascending:false}).limit(30);
  if (!data?.length) { el.innerHTML='<div style="text-align:center;padding:40px;color:var(--ice-3)">Tiada rekod mining</div>'; return; }
  el.innerHTML = data.map(t=>`
    <div style="display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border)">
      <div style="width:40px;height:40px;border-radius:13px;background:rgba(249,115,22,.1);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">⛏️</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700">${t.description||'Mining Reward'}</div>
        <div style="font-size:10px;color:var(--ice-3)">${UI.date(t.created_at)} · ${UI.time(t.created_at)}</div>
      </div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--profit)">+${UI.rm(t.amount)}</div>
    </div>`).join('');
}

/* ── HERO STATS ─────────────────────────────────────────── */
async function loadHeroStats() {
  const { data } = await db.from('user_machines').select('*').eq('user_id',_user.id).eq('status','active');
  _myMachines = data||[];
  const totalEarned = _myMachines.reduce((s,m)=>s+(m.total_earned||0),0);
  const dailyRate   = _myMachines.reduce((s,m)=>s+(m.daily_profit||0),0);
  const pending     = _myMachines.filter(m=>!m.last_claimed_at||(Date.now()-new Date(m.last_claimed_at))>=23.5*3600000).reduce((s,m)=>s+(m.daily_profit||0),0);
  document.getElementById('heroTotal').textContent    = UI.rm(totalEarned);
  document.getElementById('heroMachines').textContent = _myMachines.length;
  document.getElementById('heroDaily').textContent    = UI.rm(dailyRate);
  document.getElementById('heroPending').textContent  = UI.rm(pending);
  document.getElementById('hdrMining').textContent    = `+${UI.rm(dailyRate)}/hari`;
  renderShop();
}

async function init() {
  UI.loading();
  const { data:{session} } = await db.auth.getSession();
  if (!session) { location.href='login.html'; return; }
  _user = session.user;
  Lang.init();
  const { data:p } = await db.from('profiles').select('*').eq('id',_user.id).single();
  _profile = p||{};
  await loadHeroStats();
  UI.unload();
}
window.addEventListener('load',init);
</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js')
      .catch(e => console.warn('SW reg failed:', e));
  });
}
</script>
