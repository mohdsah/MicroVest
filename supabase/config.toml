# ═══════════════════════════════════════════════════════════════
# MicroVest v8 — supabase/config.toml
# Supabase CLI Configuration
# ─────────────────────────────────────────────────────────────
# Setup:
#   npm install supabase -g
#   supabase login
#   supabase link --project-ref zmyiaviafmmwpgxfvsbq
#   supabase db push   (apply migrations)
#   supabase start     (local dev)
# ═══════════════════════════════════════════════════════════════

project_id = "zmyiaviafmmwpgxfvsbq"

[api]
  enabled   = true
  port      = 54321
  schemas   = ["public", "graphql_public"]
  extra_search_path = ["public", "extensions"]
  max_rows  = 1000

[api.tls]
  enabled = false

[db]
  port          = 54322
  shadow_port   = 54320
  major_version = 15

[db.pooler]
  enabled         = false
  port            = 54329
  pool_mode       = "transaction"
  default_pool_size = 20
  max_client_conn = 100

[realtime]
  enabled = true
  ip_version = "IPv4"

[studio]
  enabled = true
  port    = 54323
  api_url = "http://127.0.0.1"
  openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
  enabled       = true
  port          = 54324
  smtp_port     = 54325
  pop3_port     = 54326

[storage]
  enabled       = true
  file_size_limit = "50MiB"

[storage.image_transformation]
  enabled = true

[auth]
  enabled           = true
  site_url          = "https://microvest.app"
  additional_redirect_urls = [
    "https://microvest.app/login.html",
    "https://microvest.app/dashboard.html",
    "http://localhost:8888/login.html",
    "http://localhost:8888/dashboard.html",
  ]
  jwt_expiry        = 3600
  enable_refresh_token_rotation = true
  refresh_token_reuse_interval  = 10
  enable_signup     = true
  enable_anonymous_sign_ins     = false
  minimum_password_length       = 8
  password_requirements         = "lower_upper_digits_symbols"

[auth.rate_limit]
  # Max sign-up attempts per hour
  email_sent_per_hour = 10
  sms_sent_per_hour   = 10
  # Requests per minute
  token_refresh_limit = 30
  sign_in_rate        = 30
  otp_rate            = 5

[auth.email]
  enable_signup         = true
  double_confirm_changes = true
  enable_confirmations  = true
  secure_password_change = true

[auth.email.template.confirmation]
  subject  = "Sahkan akaun MicroVest anda"
  content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
  subject  = "Tetapkan semula kata laluan MicroVest"
  content_path = "./supabase/templates/recovery.html"

[auth.email.template.magic_link]
  subject  = "Log masuk MicroVest anda"

[auth.sms]
  enable_signup        = false
  enable_confirmations = false

[auth.external.google]
  enabled     = false
  client_id   = "env(GOOGLE_CLIENT_ID)"
  secret      = "env(GOOGLE_CLIENT_SECRET)"

[edge_runtime]
  enabled       = true
  policy        = "per_worker"
  inspector_port = 8083

[[remotes]]
  name        = "production"
  project_ref = "zmyiaviafmmwpgxfvsbq"
  branch      = "main"

[[remotes]]
  name        = "staging"
  project_ref = "zmyiaviafmmwpgxfvsbq"
  branch      = "develop"
