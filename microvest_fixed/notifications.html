<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#020206">
<title>MicroVest v8 | Notifikasi</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/v10.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="amb-v"></div>
<div class="shell">

  <!-- HEADER -->
  <div class="pg-hd anim a1">
    <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <div>
      <div class="pg-title">Notifikasi</div>
      <div class="pg-sub" id="pgSub">Memuatkan...</div>
    </div>
    <div id="hdrBadge" style="margin-left:auto;display:none">
      <span class="chip chip-v" id="unreadCount" style="font-family:'JetBrains Mono',monospace;font-size:11px">0</span>
    </div>
  </div>

  <!-- FILTER PILLS -->
  <div class="filter-row anim a2">
    <button class="fp on" id="fp-all"         onclick="setFilter('all',this)">Semua</button>
    <button class="fp"    id="fp-deposit"      onclick="setFilter('deposit',this)">💰 Deposit</button>
    <button class="fp"    id="fp-withdraw"     onclick="setFilter('withdraw',this)">💸 Withdraw</button>
    <button class="fp"    id="fp-profit"       onclick="setFilter('profit',this)">📈 Profit</button>
    <button class="fp"    id="fp-mining"       onclick="setFilter('mining',this)">⛏️ Mining</button>
    <button class="fp"    id="fp-referral"     onclick="setFilter('referral',this)">👥 Referral</button>
    <button class="fp"    id="fp-achievement"  onclick="setFilter('achievement',this)">🏆 Pencapaian</button>
  </div>

  <!-- ACTION BAR -->
  <div class="action-bar anim a2">
    <span class="ab-count" id="listCount">0 notifikasi</span>
    <div style="display:flex;gap:8px">
      <button class="ab-btn" onclick="markAllRead()">✓ Baca Semua</button>
      <button class="ab-btn" onclick="deleteRead()" style="color:#EF444480;border-color:rgba(239,68,68,.2)">🗑 Padam Lama</button>
    </div>
  </div>

  <!-- NOTIFICATION LIST -->
  <div id="notifList" class="anim a3">
    <div class="skel skel-row" style="border-radius:14px;margin:8px var(--pad)"></div>
    <div class="skel skel-row" style="border-radius:14px;margin:8px var(--pad)"></div>
    <div class="skel skel-row" style="border-radius:14px;margin:8px var(--pad)"></div>
  </div>

  <!-- LOAD MORE -->
  <div style="padding:16px var(--pad);text-align:center" id="loadMoreWrap" style="display:none">
    <button class="btn btn-ghost" id="loadMoreBtn" onclick="loadMore()" style="width:100%">
      Muat Lebih Banyak
    </button>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item active"><i class="fas fa-house"></i><span>Home</span></a>
  <a href="investment.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Invest</span></a>
  <a href="robots.html" class="nav-item" style="position:relative">
    <span style="position:absolute;top:-3px;left:50%;transform:translateX(-50%);width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#5B21B6,#7C3AED);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(124,58,237,.5);pointer-events:none"></span><i class="fas fa-robot"></i><span>Robot</span></a>
  <a href="mining.html" class="nav-item"><i class="fas fa-microchip"></i><span>Mining</span></a>
  <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i><span>Profil</span></a>
</nav>

<!-- DETAIL SHEET -->
<div id="detSheet"></div>

<script src="js/config.js"></script>
<script src="js/security.js"></script>
<script src="js/realtime.js"></script>
<script src="js/push.js"></script>
<script src="js/ui.js"></script>
<script src="js/lang.js"></script>
<script>
let _user, _all = [], _filtered = [], _curFilter = 'all', _page = 0;
const PAGE_SIZE = 30;

/* ── TYPE CONFIG ─────────────────────────────────────────────── */
const T = {
  welcome:     { icon:'🎉', label:'Selamat Datang', cls:'type-welcome',  fp:'all'       },
  deposit:     { icon:'💰', label:'Deposit',         cls:'type-deposit',  fp:'deposit'   },
  withdraw:    { icon:'💸', label:'Withdraw',        cls:'type-withdraw', fp:'withdraw'  },
  profit:      { icon:'📈', label:'Profit',          cls:'type-profit',   fp:'profit'    },
  mining:      { icon:'⛏️', label:'Mining',          cls:'type-mining',   fp:'mining'    },
  referral:    { icon:'👥', label:'Referral',        cls:'type-referral', fp:'referral'  },
  invest:      { icon:'📊', label:'Pelaburan',       cls:'type-invest',   fp:'all'       },
  achievement: { icon:'🏆', label:'Pencapaian',      cls:'type-achievement',fp:'achievement'},
  mission:     { icon:'🎯', label:'Misi',            cls:'type-mission',  fp:'achievement'},
  bonus:       { icon:'🎁', label:'Ganjaran',        cls:'type-mining',   fp:'all'       },
  info:        { icon:'📣', label:'Pengumuman',      cls:'type-info',     fp:'all'       },
};

const FP_COLORS = {
  deposit:'#22C55E', withdraw:'#EF4444', profit:'#7C3AED',
  mining:'#F97316', referral:'#3B82F6', achievement:'#F59E0B',
};

/* ── LOAD ─────────────────────────────────────────────────────── */
async function loadNotifications() {
  const { data } = await db.from('notifications')
    .select('*').eq('user_id', _user.id)
    .order('created_at', { ascending: false })
    .limit(200);
  _all = data || [];

  const unread = _all.filter(n => !n.is_read).length;
  const badge  = document.getElementById('unreadCount');
  const hdrB   = document.getElementById('hdrBadge');

  if (unread > 0) {
    badge.textContent = unread + ' baru';
    hdrB.style.display = '';
  } else hdrB.style.display = 'none';

  document.getElementById('pgSub').textContent = `${_all.length} notifikasi`;
  applyFilter(_curFilter);
}

/* ── FILTER ──────────────────────────────────────────────────── */
function setFilter(type, btn) {
  _curFilter = type;
  _page      = 0;
  document.querySelectorAll('.fp').forEach(b => {
    b.classList.remove('on');
    b.style.cssText = '';
  });
  btn.classList.add('on');
  const clr = FP_COLORS[type];
  if (clr) {
    btn.style.background   = clr + '20';
    btn.style.borderColor  = clr + '40';
    btn.style.color        = clr;
  } else {
    btn.style.background   = 'var(--v-dim)';
    btn.style.borderColor  = 'var(--v-border)';
    btn.style.color        = 'var(--v-pale)';
  }
  applyFilter(type);
}

function applyFilter(type) {
  if (type === 'all') {
    _filtered = [..._all];
  } else {
    _filtered = _all.filter(n => {
      const tc = T[n.type]?.fp || 'all';
      return n.type === type || tc === type;
    });
  }
  document.getElementById('listCount').textContent = `${_filtered.length} notifikasi`;
  renderPage(true);
}

/* ── RENDER ───────────────────────────────────────────────────── */
function renderPage(reset = false) {
  const el  = document.getElementById('notifList');
  const page = _filtered.slice(0, (_page + 1) * PAGE_SIZE);

  if (!_filtered.length) {
    el.innerHTML = `
      <div class="empty-notif">
        <div style="font-size:56px;margin-bottom:18px">🔔</div>
        <div style="font-size:16px;font-weight:700;margin-bottom:8px">Tiada Notifikasi</div>
        <p style="font-size:13px;color:var(--ice-3)">Notifikasi baru akan muncul di sini</p>
      </div>`;
    document.getElementById('loadMoreWrap').style.display = 'none';
    return;
  }

  // Group by date
  const groups = {};
  page.forEach(n => {
    const d = new Date(n.created_at);
    const today    = new Date().toDateString();
    const yest     = new Date(Date.now() - 86400000).toDateString();
    const key      = d.toDateString() === today ? 'Hari Ini'
                   : d.toDateString() === yest  ? 'Semalam'
                   : d.toLocaleDateString('ms-MY', { weekday:'short', day:'numeric', month:'short' });
    if (!groups[key]) groups[key] = [];
    groups[key].push(n);
  });

  el.innerHTML = Object.entries(groups).map(([date, items]) => `
    <div style="padding:10px var(--pad) 4px;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--ice-3);font-weight:800">${date}</div>
    ${items.map(n => renderItem(n)).join('')}
  `).join('');

  const more = document.getElementById('loadMoreWrap');
  if (_filtered.length > (_page + 1) * PAGE_SIZE) {
    more.style.display = '';
    document.getElementById('loadMoreBtn').textContent = `Muat ${Math.min(PAGE_SIZE, _filtered.length - (_page+1)*PAGE_SIZE)} lagi`;
  } else more.style.display = 'none';
}

function renderItem(n) {
  const cfg = T[n.type] || T.info;
  return `
    <div class="notif-item ${n.is_read ? '' : 'unread'}" onclick="openDetail('${n.id}')">
      <div class="ni-ico ${cfg.cls}">${cfg.icon}</div>
      <div class="ni-body">
        <div class="ni-msg" style="color:${n.is_read?'var(--ice-2)':'var(--ice)'};font-weight:${n.is_read?400:700}">${n.message}</div>
        <div class="ni-time">
          <span>${cfg.label}</span>
          <span style="opacity:.4">·</span>
          <span>${UI.ago(n.created_at)}</span>
        </div>
      </div>
      ${!n.is_read ? '<div class="unread-badge"></div>' : ''}
    </div>`;
}

function loadMore() {
  _page++;
  renderPage(false);
}

/* ── DETAIL SHEET ─────────────────────────────────────────────── */
async function openDetail(id) {
  const n = _all.find(x => x.id === id);
  if (!n) return;

  // Mark as read
  if (!n.is_read) {
    await db.from('notifications').update({ is_read: true }).eq('id', id);
    n.is_read = true;
    renderPage(false);
    // Update badge
    const unread = _all.filter(x => !x.is_read).length;
    const badge = document.getElementById('unreadCount');
    const hdrB  = document.getElementById('hdrBadge');
    if (unread > 0) { badge.textContent = unread + ' baru'; }
    else { hdrB.style.display = 'none'; }
  }

  const cfg = T[n.type] || T.info;
  const det = document.getElementById('detSheet');
  det.innerHTML = `
    <div class="det-back" onclick="closeDet(event)">
      <div class="det-box" onclick="event.stopPropagation()">
        <div style="width:36px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin:0 auto 24px"></div>
        <div style="text-align:center;margin-bottom:24px">
          <div style="font-size:48px;margin-bottom:14px">${cfg.icon}</div>
          <div class="chip chip-v" style="margin:0 auto 10px;width:fit-content">${cfg.label}</div>
          <div style="font-size:12px;color:var(--ice-3)">${UI.date(n.created_at)} · ${UI.time(n.created_at)}</div>
        </div>
        <div style="background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--r-xl);padding:18px;margin-bottom:22px;font-size:14px;line-height:1.7;color:var(--ice-2)">
          ${n.message}
        </div>
        <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--ice-3);margin-bottom:8px;text-align:center">ID</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--ice-3);text-align:center;word-break:break-all">${n.id}</div>
        <div style="display:flex;gap:10px;margin-top:22px">
          <button onclick="deleteOne('${n.id}')" class="btn btn-ghost" style="flex:1;color:#EF444480;border-color:rgba(239,68,68,.2)">🗑 Padam</button>
          <button onclick="closeDet(null)" class="btn btn-v" style="flex:1">Tutup</button>
        </div>
      </div>
    </div>`;
}

function closeDet(e) {
  if (!e || e.target.classList.contains('det-back'))
    document.getElementById('detSheet').innerHTML = '';
}

/* ── ACTIONS ─────────────────────────────────────────────────── */
async function markAllRead() {
  const unreadIds = _all.filter(n => !n.is_read).map(n => n.id);
  if (!unreadIds.length) { UI.toast('Tiada notifikasi belum dibaca', 'info'); return; }
  UI.loading();
  await db.from('notifications').update({ is_read: true }).eq('user_id', _user.id).eq('is_read', false);
  _all.forEach(n => n.is_read = true);
  document.getElementById('hdrBadge').style.display = 'none';
  renderPage(false);
  UI.unload();
  UI.toast(`✅ ${unreadIds.length} notifikasi ditanda dibaca`, 'success');
}

async function deleteRead() {
  const readIds = _all.filter(n => n.is_read).map(n => n.id);
  if (!readIds.length) { UI.toast('Tiada notifikasi lama untuk dipadam', 'info'); return; }
  UI.confirm(
    'Padam Notifikasi Lama',
    `Padam ${readIds.length} notifikasi yang sudah dibaca?`,
    async () => {
      UI.loading();
      await db.from('notifications').delete().eq('user_id', _user.id).eq('is_read', true);
      _all = _all.filter(n => !n.is_read);
      applyFilter(_curFilter);
      UI.unload();
      UI.toast(`🗑 ${readIds.length} notifikasi dipadam`, 'success');
    },
    'Padam'
  );
}

async function deleteOne(id) {
  UI.loading();
  await db.from('notifications').delete().eq('id', id);
  _all = _all.filter(n => n.id !== id);
  closeDet(null);
  applyFilter(_curFilter);
  UI.unload();
  UI.toast('Notifikasi dipadam', 'success');
}

/* ── REALTIME ─────────────────────────────────────────────────── */
function subscribeRealtime() {
  db.channel('notif-page')
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'notifications',
      filter: `user_id=eq.${_user.id}`,
    }, payload => {
      _all.unshift(payload.new);
      applyFilter(_curFilter);
      // Badge flash
      const badge = document.getElementById('unreadCount');
      const hdrB  = document.getElementById('hdrBadge');
      const unread = _all.filter(n => !n.is_read).length;
      badge.textContent = unread + ' baru';
      hdrB.style.display = '';
    })
    .subscribe();
}

/* ── INIT ─────────────────────────────────────────────────────── */
async function init() {
  UI.loading();
  const { data: { session } } = await db.auth.getSession();
  if (!session) { location.href = 'login.html'; return; }
  _user = session.user;
  Lang.init();
  await loadNotifications();
  subscribeRealtime();
  UI.unload();
}
window.addEventListener('load', init);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js')
      .catch(e => console.warn('SW reg failed:', e));
  });
}
</script>
</body>
</html>
