# ═══════════════════════════════════════════════════════════════
# MicroVest v8 — .github/workflows/pr-check.yml
# Pull Request Quality Checks
# ═══════════════════════════════════════════════════════════════

name: 🔍 PR Quality Check

on:
  pull_request:
    branches: [main, develop]

jobs:
  code-quality:
    name: 📋 Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 🔍 Check SQL migrations
        run: |
          echo "=== Checking SQL migration files ==="
          for f in supabase/migrations/*.sql; do
            [ -f "$f" ] || continue
            echo "Checking: $f"
            # Basic SQL syntax hints
            if grep -i "DROP TABLE\|TRUNCATE\|DELETE FROM profiles" "$f"; then
              echo "⚠️  WARNING: Destructive SQL operation found in migration: $f"
            fi
          done
          echo "✅ SQL check done"

      - name: 📏 Check file sizes
        run: |
          echo "=== Large file check (warn if >500KB) ==="
          find . -not -path './.git/*' -size +500k -type f | while read f; do
            echo "⚠️  Large file: $f ($(du -h "$f" | cut -f1))"
          done

      - name: 🛡️ OWASP Quick Scan
        run: |
          echo "=== Basic security patterns check ==="
          
          # Check for eval() usage
          if grep -rn "eval(" --include="*.js" --exclude-dir=".git" . | grep -v "//"; then
            echo "⚠️  eval() usage found — review for XSS risk"
          fi
          
          # Check for innerHTML with user data
          if grep -rn "innerHTML\s*=\s*[^'\"]\|innerHTML\s*\+=\s*[^'\"]" --include="*.js" --exclude-dir=".git" . | grep -v "//"; then
            echo "⚠️  Dynamic innerHTML detected — ensure content is sanitized"
          fi
          
          echo "✅ Basic security scan complete"

      - name: 📝 PR Summary
        run: |
          echo "## PR Check Summary"
          echo "Branch: ${{ github.head_ref }}"
          echo "Files changed: $(git diff --name-only origin/main HEAD | wc -l)"
          echo "HTML files: $(find . -name "*.html" -not -path "./.git/*" | wc -l)"
